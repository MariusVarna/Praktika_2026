<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Žaidimas — Pavadinimas</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#f5f1e8 0%,#f0ebe0 100%);background-attachment:fixed;color:#333;display:flex;flex-direction:column;overflow:hidden;position:relative;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 50 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25 2L41.5 11V29L25 38L8.5 29V11Z' fill='none' stroke='%23d4cec2' stroke-width='0.5' opacity='0.5'/%3E%3C/svg%3E");background-size:50px 50px;pointer-events:none;z-index:0;}
    body>*{position:relative;z-index:1;}

    header{background:linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-shrink:0;z-index:50;}
    .hl{display:flex;align-items:center;gap:10px;}
    .menu-btn{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:6px;border-radius:7px;transition:background .2s;line-height:1;}
    .menu-btn:hover{background:rgba(255,255,255,.1);}
    .logo{color:white;font-size:15px;font-weight:700;}
    .team-badge{background:rgba(255,255,255,.2);color:white;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
    .hr-right{display:flex;align-items:center;gap:6px;}
    .bets-status-hdr{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;transition:all .3s;}
    .bets-open-hdr{background:rgba(39,174,96,.3);color:#7effc0;border:1px solid rgba(39,174,96,.4);}
    .bets-closed-hdr{background:rgba(231,76,60,.2);color:#ffb3ae;border:1px solid rgba(231,76,60,.3);}

    .sidebar{position:fixed;left:0;top:56px;width:240px;height:calc(100vh - 56px);background:white;border-right:1px solid #e0d9cc;z-index:100;transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:2px 0 8px rgba(0,0,0,.1);}
    .sidebar.active{transform:translateX(0);}
    .sb-head{padding:14px 18px;border-bottom:1px solid #e0d9cc;background:#fafaf8;}
    .sb-head h2{font-size:14px;font-weight:700;color:#2f4a75;}
    .sb-item{padding:12px 18px;cursor:pointer;transition:all .18s;color:#555;font-weight:500;font-size:13px;border-left:3px solid transparent;}
    .sb-item:hover{background:#f5f1e8;color:#2f4a75;border-left-color:#2f4a75;padding-left:22px;}
    .overlay{position:fixed;top:56px;left:0;width:100%;height:calc(100vh - 56px);background:rgba(0,0,0,0);z-index:99;opacity:0;pointer-events:none;transition:all .3s;}
    .overlay.active{background:rgba(0,0,0,.4);opacity:1;pointer-events:all;}

    /* Round nav */
    .round-nav{background:white;border-bottom:1px solid #e0d9cc;padding:8px 14px;display:flex;align-items:center;gap:6px;overflow-x:auto;flex-shrink:0;}
    .round-nav::-webkit-scrollbar{height:0;}
    .rnav-label{font-size:11px;font-weight:700;color:#888;white-space:nowrap;margin-right:4px;flex-shrink:0;}
    .rbtn{padding:5px 13px;border:1.5px solid #d4cec2;border-radius:20px;background:white;font-size:12px;font-weight:700;color:#888;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;display:flex;align-items:center;gap:4px;}
    .rbtn:hover{border-color:#2f4a75;color:#2f4a75;}
    .rbtn.current{background:#2f4a75;color:white;border-color:#2f4a75;}
    .rbtn.past{background:#f5f1e8;color:#aaa;border-color:#e0d9cc;}
    .rbtn.viewing{outline:2px solid #f39c12;outline-offset:1px;}

    main{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}

    .readonly-banner{background:#fef3cd;border:1px solid #ffd966;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;color:#856404;display:flex;align-items:center;gap:6px;}
    .readonly-banner.hidden{display:none;}

    /* Chart card */
    .chart-card{background:white;border-radius:10px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);border:1px solid #e8dfd4;}
    .chart-card-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .chart-card-title h3{font-size:13px;font-weight:700;color:#2f4a75;}
    .chart-card-title span{font-size:10px;color:#aaa;}
    .chart-wrap{position:relative;height:220px;}
    .chart-note{font-size:10px;color:#aaa;margin-top:5px;text-align:center;}

    /* Status bar */
    .status-bar{background:white;border-radius:10px;padding:10px 14px;box-shadow:0 2px 6px rgba(0,0,0,.06);border:1px solid #e8dfd4;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
    .stat-chip{display:flex;flex-direction:column;align-items:center;min-width:64px;}
    .stat-chip .v{font-size:15px;font-weight:700;color:#2f4a75;}
    .stat-chip .l{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.3px;margin-top:1px;}
    .stat-sep{width:1px;height:32px;background:#e0d9cc;flex-shrink:0;}

    /* Energy */
    .energy-card{background:white;border-radius:10px;padding:12px 14px;box-shadow:0 2px 6px rgba(0,0,0,.06);border:1px solid #e8dfd4;}
    .energy-card h3{font-size:12px;font-weight:700;color:#2f4a75;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px;}
    .energy-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
    @media(max-width:480px){.energy-grid{grid-template-columns:repeat(2,1fr);}}
    .ebox{background:#f9f7f3;border:1px solid #e8dfd4;border-radius:8px;padding:8px;text-align:center;}
    .ebox .v{font-size:14px;font-weight:700;color:#2f4a75;}
    .ebox .l{font-size:9px;color:#888;margin-top:2px;}
    .ebox.highlight{background:#e8f0fb;border-color:#b8d4f8;}

    /* Bid table */
    .bid-card{background:white;border-radius:10px;padding:12px 14px;box-shadow:0 2px 6px rgba(0,0,0,.06);border:1px solid #e8dfd4;}
    .bid-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .bid-card-header h3{font-size:12px;font-weight:700;color:#2f4a75;text-transform:uppercase;letter-spacing:.4px;}
    .bid-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .btn{padding:6px 13px;border:none;border-radius:7px;cursor:pointer;font-weight:600;font-size:12px;transition:all .18s;}
    .btn-primary{background:linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);color:white;}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(47,74,117,.3);}
    .btn-primary:disabled{background:#b0b8c1;cursor:not-allowed;transform:none;box-shadow:none;}
    .btn-sec{background:#e8dfd4;color:#555;}
    .btn-sec:hover{background:#ddd5c8;}
    .btn-warn-sm{padding:4px 10px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:11px;background:linear-gradient(135deg,#e67e22,#ca6f1e);color:white;transition:all .15s;}
    .btn-warn-sm:hover{transform:translateY(-1px);}
    .bid-submitted-pill{background:#e8f8f0;color:#1e8449;border:1px solid #a9dfbf;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
    .bid-draft-pill{background:#fef9e7;color:#d68910;border:1px solid #f9e79f;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
    .bid-scroll{max-height:400px;overflow-y:auto;border:1px solid #e8dfd4;border-radius:8px;}
    .bid-scroll::-webkit-scrollbar{width:4px;}
    .bid-scroll::-webkit-scrollbar-thumb{background:#d4cec2;border-radius:3px;}
    .bid-row{display:grid;grid-template-columns:50px 70px 70px 70px 70px 80px 80px;gap:4px;align-items:center;padding:8px 8px;border-bottom:1px solid #f0ebe0;font-size:11px;background:white;cursor:pointer;}
    .bid-row:last-child{border-bottom:none;}
    .bid-row:hover{background:#fafaf8;}
    .bid-row.header-row{background:#f5f1e8;position:sticky;top:0;font-weight:700;font-size:10px;color:#2f4a75;text-transform:uppercase;letter-spacing:.3px;border-bottom:1.5px solid #e0d9cc;cursor:default;}
    .bid-row.has-bid{background:#fffdf0;}
    .bid-hr-num{color:#aaa;font-size:10px;text-align:center;font-family:'Courier New',monospace;}
    .bid-expand-icon{font-size:16px;color:#2f4a75;}
    .bid-detail-row{display:none;background:#fafaf8;border-top:1px solid #e8dfd4;}
    .bid-detail-row.open{display:block;}
    .bid-detail-header{display:grid;grid-template-columns:40px 70px 1fr 1fr 64px 40px;background:#e8dfd4;padding:6px 8px;font-size:9px;font-weight:700;color:#2f4a75;border-bottom:1px solid #d4cec2;}
    .bid-detail-item{display:grid;grid-template-columns:40px 70px 1fr 1fr 64px 40px;align-items:center;padding:6px 8px;border-bottom:1px solid #f0ebe0;font-size:11px;}
    .bid-battery-row{display:grid;grid-template-columns:40px 1fr;align-items:center;padding:6px 8px;background:#e8f0fb;border-bottom:1px solid #b8d4f8;font-size:11px;}
    .bid-remove-btn{background:#e74c3c;color:white;border:none;border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;font-weight:600;}
    .bid-remove-btn:hover{background:#c0392b;}
    .bid-input{width:100%;padding:3px 6px;border:1.5px solid #d4cec2;border-radius:5px;background:#fafaf8;color:#333;font-size:11px;}
    .bid-input:focus{outline:none;border-color:#2f4a75;background:white;}
    .bid-input:disabled{background:#f3f3f3;color:#aaa;border-color:#eee;cursor:not-allowed;}
    .bid-select{width:100%;padding:3px 4px;border:1.5px solid #d4cec2;border-radius:5px;background:#fafaf8;color:#333;font-size:11px;}
    .bid-select:focus{outline:none;border-color:#2f4a75;}
    .bid-select:disabled{background:#f3f3f3;color:#aaa;border-color:#eee;cursor:not-allowed;}
    .bid-total{font-size:10px;color:#2f4a75;font-weight:600;text-align:right;}
    .bid-footer{display:grid;grid-template-columns:50px 70px 70px 70px 70px 80px 80px;gap:4px;align-items:center;padding:8px 8px;background:#f0f7ff;border-top:2px solid #b8d4f8;font-size:11px;font-weight:700;color:#2f4a75;border-radius:0 0 8px 8px;}

    /* Tx */
    .tx-card{background:white;border-radius:10px;padding:12px 14px;box-shadow:0 2px 6px rgba(0,0,0,.06);border:1px solid #e8dfd4;}
    .tx-card h3{font-size:12px;font-weight:700;color:#2f4a75;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
    .tx-list{max-height:130px;overflow-y:auto;}
    .tx-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f5f1e8;font-size:11px;}
    .tx-row:last-child{border-bottom:none;}
    .tx-buy{color:#27ae60;font-weight:700;flex-shrink:0;}
    .tx-sell{color:#e74c3c;font-weight:700;flex-shrink:0;}
    .tx-info{flex:1;color:#555;}
    .tx-meta{color:#bbb;flex-shrink:0;}

    /* Hour detail modal */
    .modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
    .modal-bd.open{display:flex;}
    .modal{background:white;border-radius:14px;width:100%;max-width:750px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:85vh;display:flex;flex-direction:column;}
    .modal-hd{padding:13px 16px;border-bottom:1px solid #e0d9cc;display:flex;justify-content:space-between;align-items:center;border-radius:14px 14px 0 0;}
    .modal-hd h2{font-size:14px;font-weight:700;color:#2f4a75;}
    .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:2px;}
    .modal-body{padding:14px 16px;overflow-y:auto;flex:1;}

    .toast{position:fixed;bottom:14px;right:14px;background:#2f4a75;color:white;padding:8px 13px;border-radius:8px;font-size:12px;font-weight:600;z-index:500;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}

    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-thumb{background:#d4cec2;border-radius:3px;}
  </style>
</head>
<body>

    <header>
        <div class="hl">
            <button class="menu-btn" id="menuBtn">☰</button>
            <span class="logo">Pavadinimas</span>
            <span class="team-badge" id="teamBadge">Komanda</span>
        </div>
        <div class="hr-right">
            <span class="bets-status-hdr bets-closed-hdr" id="betsHdr">Uždaryti</span>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="sb-head"><h2>Navigacija</h2></div>
        <div class="sb-item" onclick="nav('/pages/review.html')">Atsiliepimai</div>
        <div class="sb-item" onclick="nav('/pages/help.html')">Žinynas</div>
        <div class="sb-item" onclick="nav('/pages/settings.html')">Parinktys</div>
        <div class="sb-item" onclick="logout()">Palikti sesija</div>
    </div>
    <div class="overlay" id="overlay"></div>

    <div class="round-nav" id="roundNav">
        <span class="rnav-label">Diena:</span>
    </div>

    <main id="mainContent"></main>

    <!-- Hour detail modal -->
    <div class="modal-bd" id="hourModal">
        <div class="modal">
            <div class="modal-hd">
                <h2 id="hourModalTitle">Valanda</h2>
                <button class="modal-close" onclick="closeHourModal()">×</button>
            </div>
            <div class="modal-body" id="hourModalBody"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script>
        // ══════════════════════════════════════════════
        // DATA MODEL
        // round = one full day
        // bidRows[round] = array of 24 arrays of objects: [[{price, mw, type}, ...], ...]
        // marketPrices[round] = array of 24 numbers (market price per hour)
        // ══════════════════════════════════════════════
        const NUM_HOURS = 24;

        let session = null, myTeam = null, viewRound = 1, editingSubmitted = false;
        let hourSupplyChartInstance = null;

        async function loadSession() {
            const sid = sessionStorage.getItem(KEYS.SESSION_ID);
            const uid = sessionStorage.getItem(KEYS.USER_ID);
            if (!sid || !uid) { nav('/pages/join.html'); return; }

            try {
                session = await API.Sessions.get(sid);
                if (!session.numRounds && session.duration_days) {
                    session.numRounds = session.duration_days;
                }
                console.log('=== SESSION DATA ===');
                console.log('Session rounds:', session.rounds);
                console.log('Teams:', session.teams);

                // Initialize market prices storage
                if (!session.marketPrices) session.marketPrices = {};

                // Map backend state
                const latestRound = session.rounds && session.rounds.length ? session.rounds[session.rounds.length - 1] : null;
                session.roundStarted = session.status === 'active' && !!latestRound;
                session.betsOpen = latestRound ? (latestRound.status === 'bidding') : false;
                session.currentRound = latestRound ? latestRound.round_number : 1;

                // Get player state
                const state = await API.Players.getState(uid);

                const teamData = (session.teams || []).find(t => String(t.id) === String(uid));
                console.log('My team data:', teamData);
                console.log('Team bids:', teamData?.bids);
                console.log('Team bidRows from backend:', teamData?.bidRows);

                // Create myTeam object
                myTeam = {
                    id: uid,
                    name: teamData ? teamData.name : sessionStorage.getItem(KEYS.TEAM_NAME),
                    balance: state.total_profit,
                    batteryStored: state.current_battery_mwh,
                    batteryCapacity: session.battery_max_mwh || 100,
                    bids: [],
                    bidRows: {},
                    roundHistory: []
                };

                // Use bidRows directly if available
                if (teamData && teamData.bidRows) {
                    console.log('Using bidRows directly from backend');
                    // Deep copy the bidRows structure
                    myTeam.bidRows = JSON.parse(JSON.stringify(teamData.bidRows));

                    // Also mark rounds as submitted
                    Object.keys(myTeam.bidRows).forEach(roundNum => {
                        if (!myTeam.bids.some(b => b.round === parseInt(roundNum))) {
                            myTeam.bids.push({ round: parseInt(roundNum), submitted: true });
                        }
                    });

                    console.log('Loaded bidRows:', myTeam.bidRows);
                }
                // Fallback Build bidRows from bids if bidRows not available
                else if (teamData && teamData.bids && teamData.bids.length > 0) {
                    console.log('Falling back to building bidRows from bids');
                    teamData.bids.forEach(b => {
                        const rNum = b.round;
                        if (!myTeam.bidRows[rNum]) {
                            myTeam.bidRows[rNum] = Array(24).fill(null).map(() => []);
                        }
                        myTeam.bidRows[rNum][b.hour].push({
                            price: b.price,
                            mw: b.volume_mwh,
                            type: b.bid_type ? 'buy' : 'sell'
                        });
                        if (!myTeam.bids.some(x => x.round === rNum)) {
                            myTeam.bids.push({ round: rNum, submitted: true });
                        }
                    });
                    console.log('Built bidRows from bids:', myTeam.bidRows);
                } else {
                    console.log('No bids found in backend response');
                }

                // Load market prices for all rounds
                for (const rObj of (session.rounds || [])) {
                    try {
                        let prices = null;

                        if (rObj.status === 'calculated') {
                            const res = await API.Admin.getResults(sid, rObj.id);
                            if (res && res.market_clearing && Array.isArray(res.market_clearing)) {
                                prices = res.market_clearing.map(mc => mc.clearing_price || mc.price);
                                console.log(`Loaded REAL prices for round ${rObj.round_number}`);
                            }
                        } else if (rObj.status === 'bidding') {
                            const res = await API.Sessions.getForecast(sid, rObj.id);
                            if (res && res.forecast && Array.isArray(res.forecast)) {
                                prices = res.forecast.map(f => f.predicted_price || f.price);
                                console.log(`Loaded FORECAST prices for round ${rObj.round_number}`);
                            }
                        }

                        if (prices && prices.length === 24) {
                            session.marketPrices[rObj.round_number] = prices;
                        } else {
                            const defaultPrice = session.market_price || session.marketPrice || 70;
                            session.marketPrices[rObj.round_number] = Array(24).fill(defaultPrice);
                        }
                    } catch (err) {
                        console.warn(`Failed to load prices for round ${rObj.round_number}:`, err);
                        const defaultPrice = session.market_price || session.marketPrice || 70;
                        session.marketPrices[rObj.round_number] = Array(24).fill(defaultPrice);
                    }
                }

                // Ensure current round has prices
                if (latestRound && !session.marketPrices[latestRound.round_number]) {
                    try {
                        const res = await API.Sessions.getForecast(sid, latestRound.id);
                        if (res && res.forecast) {
                            session.marketPrices[latestRound.round_number] = res.forecast.map(f => f.predicted_price);
                        }
                    } catch (err) {
                        console.warn('Failed to load current round forecast:', err);
                    }
                }

            } catch (e) {
                console.error('Failed to load session/state:', e);
                toast('Klaida užkraunant duomenis');
            }
        }
        async function getMarketPricesForRound(round) {
            if (!session.marketPrices) session.marketPrices = {};

            // Return cached
            if (session.marketPrices[round]) {
                return session.marketPrices[round];
            }

            // Find round object
            const roundObj = (session.rounds || []).find(r => r.round_number === round);
            let prices = Array(24).fill(null);
            const defaultPrice = session.market_price || session.marketPrice || 70;

            if (roundObj && roundObj.id) {
                try {
                    if (roundObj.status === 'calculated') {
                        const res = await API.Admin.getResults(session.id, roundObj.id);
                        console.log(`[Player] Results for round ${round}:`, res);

                        if (res && res.market_clearing && Array.isArray(res.market_clearing)) {
                            const priceMap = {};
                            res.market_clearing.forEach(mc => {
                                if (mc.hour !== undefined && mc.clearing_price !== undefined) {
                                    priceMap[mc.hour] = mc.clearing_price;
                                }
                            });

                            for (let i = 0; i < 24; i++) {
                                if (priceMap[i] !== undefined) {
                                    prices[i] = priceMap[i];
                                }
                            }
                        }
                    } else if (roundObj.status === 'bidding') {
                        const res = await API.Sessions.getForecast(session.id, roundObj.id);
                        console.log(`[Player] Forecast for round ${round}:`, res);

                        if (res && res.forecast && Array.isArray(res.forecast)) {
                            prices = res.forecast.map(f => f.predicted_price || f.price || defaultPrice);
                        }
                    }
                } catch (e) {
                    console.warn(`Failed to get prices for round ${round}:`, e);
                }
            }

            // Fill missing values
            const hasValidPrices = prices.some(p => p !== null && p !== undefined && !isNaN(p));
            if (!hasValidPrices) {
                prices = Array(24).fill(defaultPrice);
            } else {
                for (let i = 0; i < prices.length; i++) {
                    if (prices[i] === null || prices[i] === undefined || isNaN(prices[i])) {
                        if (i > 0 && prices[i - 1] !== null) {
                            prices[i] = prices[i - 1];
                        } else if (i < prices.length - 1 && prices[i + 1] !== null) {
                            prices[i] = prices[i + 1];
                        } else {
                            prices[i] = defaultPrice;
                        }
                    }
                }
            }

            session.marketPrices[round] = prices;
            return prices;
        }
        // ══════════════════════════════════════════════
        // CHART
        // ══════════════════════════════════════════════
        let chartInstance = null;

        function buildChartData(round) {
            const prices = session.marketPrices[round] || Array(24).fill(session.marketPrice || 70);
            const labels = Array.from({ length: 24 }, (_, i) => String(i).padStart(2, '0') + ':00');
            //const prices = session.marketPrices[round] || Array(NUM_HOURS).fill(session.marketPrice || 70);
            //const labels = Array.from({ length: NUM_HOURS }, (_, i) => String(i).padStart(2, '0') + ':00');

            const isSubmitted = (myTeam.bids || []).some(b => b.round === round && b.submitted);
            const savedRows = (myTeam.bidRows || {})[round] || [];
            const allBids = [];
            savedRows.forEach((hourBids, h) => {
                if (hourBids && hourBids.length) {
                    hourBids.forEach(bid => {
                        if (bid && bid.price) {
                            allBids.push({ hour: h, price: bid.price, mw: bid.mw, type: bid.type, submitted: isSubmitted });
                        }
                    });
                }
            });
            // Draft bids
            const draftBids = [];
            const isEditingNow = round === session.currentRound && editingSubmitted;
            const isNewDraft = round === session.currentRound && !isSubmitted;
            if (isEditingNow || isNewDraft) {
                for (let h = 0; h < NUM_HOURS; h++) {
                    let bidIdx = 0;
                    while (true) {
                        const p = document.getElementById('price_' + h + '_' + bidIdx);
                        if (!p) break;
                        const m = document.getElementById('mw_' + h + '_' + bidIdx);
                        const t = document.getElementById('type_' + h + '_' + bidIdx);
                        const price = +p.value || 0;
                        const mw = +m.value || 0;
                        if (price && mw) {
                            draftBids.push({ hour: h, price, mw, type: t ? t.value : 'buy' });
                        }
                        bidIdx++;
                    }
                }
            }

            return { labels, prices, allBids, draftBids };
        }

        // ══════════════════════════════════════════════
        // SUPPLY CHART FUNCTIONS

        function generateSupplyStackForHour(round, hour) {
            let seed = round * 31 + hour * 7;
            const rng = () => {
                seed = (seed * 16807) % 2147483647;
                return (seed - 1) / 2147483646;
            };

            const groups = [
                { name: 'Vėjas', color: '#4A90E2', base: 200 },
                { name: 'Saulė', color: '#F5A623', base: 150 },
                { name: 'Dujos', color: '#7B8D8E', base: 175 },
                { name: 'Vanduo', color: '#2ECC71', base: 120 },
                { name: 'Kita', color: '#9B59B6', base: 165 }
            ];

            const dayMults = [
                [0.8, 0.9, 1.0, 1.1, 1.2],
                [0.7, 1.0, 1.1, 0.9, 1.3],
                [1.2, 0.8, 1.1, 0.9, 1.0],
                [1.1, 1.2, 0.7, 1.0, 0.9],
                [1.0, 1.1, 0.9, 1.2, 0.8]
            ];
            const mult = dayMults[(round - 1) % dayMults.length];

            const labels = [];
            const values = [];
            const colors = [];

            groups.forEach((g, gi) => {
                for (let i = 0; i < 6; i++) {
                    labels.push(`${g.name} ${i + 1}`);
                    const hourFactor = 0.7 + (hour / 24) * 0.6;
                    const value = Math.round(g.base * mult[gi] * hourFactor * (0.7 + rng() * 0.6));
                    values.push(Math.max(10, value));
                    colors.push(g.color);
                }
            });

            const combined = labels.map((label, idx) => ({ label, value: values[idx], color: colors[idx] }));
            combined.sort((a, b) => a.value - b.value);

            return {
                labels: combined.map(c => c.label),
                values: combined.map(c => c.value),
                colors: combined.map(c => c.color)
            };
        }

        function generateDemandCurve(maxQuantity, basePrice, round, hour) {
            const points = [];
            const numPoints = 6;
            for (let i = 0; i <= numPoints; i++) {
                const price = basePrice + (1 - (i / numPoints)) * 50;
                const quantity = maxQuantity * (0.2 + (i / numPoints) * 0.8);
                points.push({ x: Math.round(quantity), y: Math.round(price) });
            }
            const seed = round * hour;
            points.forEach(p => {
                p.x = Math.max(10, p.x + (seed % 20) - 10);
                p.y = Math.max(20, p.y + (seed % 15) - 7);
            });
            return points.sort((a, b) => a.x - b.x);
        }

        function drawDemandCurveOnSupplyChart(chart, demandPoints, clearingQuantity, clearingPrice, clearingIndex, values) {
            if (!chart || !chart.scales || !chart.scales.x || !chart.scales.y) return;

            const ctx = chart.ctx;
            const xScale = chart.scales.x;
            const yScale = chart.scales.y;

            ctx.save();

            // Draw demand curve line
            ctx.beginPath();
            ctx.strokeStyle = '#E74C3C';
            ctx.lineWidth = 3;
            ctx.setLineDash([]);

            let firstPoint = true;
            for (let i = 0; i < demandPoints.length; i++) {
                const x = xScale.getPixelForValue(demandPoints[i].x);
                const y = yScale.getPixelForValue(demandPoints[i].y);

                if (x >= chart.chartArea.left && x <= chart.chartArea.right &&
                    y >= chart.chartArea.top && y <= chart.chartArea.bottom) {
                    if (firstPoint) {
                        ctx.moveTo(x, y);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
            }
            ctx.stroke();
            // Dashed horizontal clearing line
            if (clearingQuantity && clearingPrice && clearingIndex !== -1) {
                const clearingX = xScale.getPixelForValue(clearingQuantity);
                const clearingY = yScale.getPixelForValue(clearingPrice);
                const barMeta = chart.getDatasetMeta(0);
                if (barMeta && barMeta.data[clearingIndex]) {
                    const barX = barMeta.data[clearingIndex].x;
                    ctx.beginPath();
                    ctx.moveTo(barX, clearingY);
                    ctx.lineTo(clearingX, clearingY);
                    ctx.strokeStyle = '#F39C12';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        function renderSupplyChart(canvas, supplyData, demand, demandPoints, round, hour) {
            if (hourSupplyChartInstance) {
                try { hourSupplyChartInstance.destroy(); } catch (e) { }
                hourSupplyChartInstance = null;
            }

            // Calculate cumulative sum
            let cumulative = 0;
            const cumulativeSums = [];
            let clearingIndex = -1;
            let clearingPrice = null;
            let clearingQuantity = null;

            for (let i = 0; i < supplyData.values.length; i++) {
                cumulative += supplyData.values[i];
                cumulativeSums.push(cumulative);
            }

            // Find intersection
            for (let i = 0; i < cumulativeSums.length; i++) {
                const supplyQty = cumulativeSums[i];
                for (let j = 0; j < demandPoints.length; j++) {
                    if (demandPoints[j].x >= supplyQty) {
                        clearingIndex = i;
                        clearingQuantity = supplyQty;
                        clearingPrice = demandPoints[j].y;
                        break;
                    }
                }
                if (clearingIndex !== -1) break;
            }

            // Bar colors
            const barColors = supplyData.values.map((_, idx) => {
                if (clearingIndex !== -1 && idx <= clearingIndex) {
                    return 'rgba(46, 204, 113, 0.7)';
                }
                return supplyData.colors[idx];
            });

            const cumulativeLabels = supplyData.labels.map((label, idx) => {
                let cumulative = 0;
                for (let i = 0; i <= idx; i++) {
                    cumulative += supplyData.values[i];
                }
                return `${cumulative} MW`;
            });

            hourSupplyChartInstance = new Chart(canvas, {
                type: 'bar',
                data: {
                    labels: cumulativeLabels,
                    datasets: [{
                        data: supplyData.values,
                        backgroundColor: barColors,
                        borderRadius: 3,
                        borderWidth: 0.5,
                        borderColor: 'rgba(0,0,0,.1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => supplyData.labels[items[0].dataIndex],
                                label: (item) => {
                                    const idx = item.dataIndex;
                                    return [
                                        `Gamyba: ${item.raw} MW`,
                                        `Kumuliacinė: ${cumulativeSums[idx]} MW`
                                    ];
                                },
                                footer: () => {
                                    if (clearingPrice !== null) {
                                        return `Kliringo kaina: ${clearingPrice.toFixed(2)} $/MWh, Kiekis: ${clearingQuantity} MW`;
                                    }
                                    return `Paklausa: ${demand} MW - Nepasiekta`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: 'MW / Kaina ($)', font: { size: 10 }, color: '#888' },
                            ticks: { font: { size: 9 }, color: '#888' },
                            grid: { color: '#f0ebe0' }
                        },
                        x: {
                            ticks: {
                                font: { size: 8 },
                                maxRotation: 45,
                                minRotation: 45,
                                autoSkip: true,
                                maxTicksLimit: 15
                            },
                            grid: { display: false }
                        }
                    },
                    animation: {
                        duration: 200,
                        onComplete: function () {
                            drawDemandCurveOnSupplyChart(hourSupplyChartInstance, demandPoints, clearingQuantity, clearingPrice, clearingIndex, supplyData.values);
                        }
                    }
                }
            });

            return { clearingIndex, clearingPrice, clearingQuantity, cumulativeSums };
        }

        // ══════════════════════════════════════════════
        // HOUR DETAIL MODAL
        // ══════════════════════════════════════════════
        function openHourModal(round, hour) {
            const prices = session.marketPrices[round] || [];
            const mp = prices[hour] || session.marketPrice || 70;
            const hourBids = ((myTeam.bidRows || {})[round] || [])[hour] || [];
            const label = String(hour).padStart(2, '0') + ':00 — ' + String(hour + 1).padStart(2, '0') + ':00';

            // Get real supply/demand data from backend
            const roundObj = (session.rounds || []).find(r => r.round_number === round);
            let supplyData = null;
            let clearingPrice = mp;
            let clearingQuantity = 0;
            let demand = session.demand || 500;

            if (roundObj && roundObj.status === 'calculated') {
                try {
                    const res = API.Admin.getResults(session.id, roundObj.id);
                    if (res && res.market_clearing && res.market_clearing[hour]) {
                        const hourData = res.market_clearing[hour];
                        supplyData = {
                            labels: hourData.supply_offers?.map(o => o.source_name || `Tiekėjas ${o.source_index}`) || [],
                            values: hourData.supply_offers?.map(o => o.quantity_mw) || [],
                            colors: hourData.supply_offers?.map(o => o.color || '#4A90E2') || []
                        };
                        clearingPrice = hourData.clearing_price || mp;
                        clearingQuantity = hourData.clearing_quantity_mwh || 0;
                        demand = hourData.total_demand_mw || demand;
                    }
                } catch (err) {
                    console.warn('Failed to load market results:', err);
                }
            }
            // Fallback to generated supply if no real data
            if (!supplyData || !supplyData.values.length) {
                supplyData = generateSupplyStackForHour(round, hour);
            }
            const totalSupply = supplyData.values.reduce((sum, v) => sum + v, 0);
            document.getElementById('hourModalBody').innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
              <div style="background:#e8f0fb;border-radius:8px;padding:10px;text-align:center;">
                <div style="font-size:18px;font-weight:700;color:#2f4a75;">${mp.toFixed(2)}</div>
                <div style="font-size:10px;color:#888;margin-top:2px;">Rinkos kaina ($/MWh)</div>
              </div>
              <div style="background:${hourBids.length ? '#e8f8f0' : '#f5f1e8'};border-radius:8px;padding:10px;text-align:center;">
                <div style="font-size:18px;font-weight:700;color:${hourBids.length ? '#1e8449' : '#aaa'};">${hourBids.length ? hourBids.length + ' pasiūl.' : '—'}</div>
                <div style="font-size:10px;color:#888;margin-top:2px;">Mano pasiūlymai</div>
              </div>
            </div>

            <div style="margin-bottom:20px;">
              <div style="font-size:13px;font-weight:700;color:#2f4a75;margin-bottom:10px;">Gamybos grafikas (pagal tiekėjus)</div>
              <div style="background:#f9f7f3;border-radius:10px;padding:12px;">
                <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px;">
                  <div style="display:flex;align-items:center;gap:6px;font-size:11px;"><span style="width:12px;height:12px;border-radius:2px;background:#4A90E2;"></span><span>Vėjas</span></div>
                  <div style="display:flex;align-items:center;gap:6px;font-size:11px;"><span style="width:12px;height:12px;border-radius:2px;background:#F5A623;"></span><span>Saulė</span></div>
                  <div style="display:flex;align-items:center;gap:6px;font-size:11px;"><span style="width:12px;height:12px;border-radius:2px;background:#7B8D8E;"></span><span>Dujos</span></div>
                  <div style="display:flex;align-items:center;gap:6px;font-size:11px;"><span style="width:12px;height:12px;border-radius:2px;background:#2ECC71;"></span><span>Vanduo</span></div>
                  <div style="display:flex;align-items:center;gap:6px;font-size:11px;"><span style="width:12px;height:12px;border-radius:2px;background:#9B59B6;"></span><span>Kita</span></div>
                </div>
                <div style="position:relative;height:220px;">
                  <canvas id="supplyChart_modal"></canvas>
                </div>
                <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:11px;color:#888;">
                  <span>Iš viso gamyba: <strong>${totalSupply} MW</strong></span>
                  <span>Paklausa: <strong>${demand} MW</strong></span>

              </div>
            </div>

            ${hourBids.length ? `
              <div style="background:#f9f7f3;border-radius:8px;padding:10px;font-size:12px;">
                <div style="font-size:13px;font-weight:700;color:#2f4a75;margin-bottom:8px;">Mano pasiūlymai šią valandą</div>
                ${hourBids.map((bid, idx) => `
                  <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e8dfd4;">
                    <span style="color:#777;">#${idx + 1}</span>
                    <span style="font-weight:600;color:#2f4a75;">${bid.price} $/MWh</span>
                    <span style="font-weight:600;">${bid.mw} MW</span>
                    <span style="font-weight:600;color:${bid.type === 'buy' ? '#27ae60' : '#e74c3c'};">${bid.type === 'buy' ? 'Pirkimas' : 'Pardavimas'}</span>
                    <span style="font-weight:600;color:#2f4a75;">$${(+bid.price * +bid.mw).toLocaleString()}</span>
                  </div>
                `).join('')}
              </div>
            ` : `<p style="color:#bbb;font-size:12px;text-align:center;padding:16px;">Šiai valandai pasiūlymas nepateiktas.</p>`}
          `;

            document.getElementById('hourModal').classList.add('open');

            // Render supply chart
            setTimeout(() => {
                const canvas = document.getElementById('supplyChart_modal');
                if (canvas) {
                    const maxQuantity = totalSupply * 1.2;
                    const demandPoints = generateDemandCurve(maxQuantity, mp, round, hour);
                    renderSupplyChart(canvas, supplyData, demand, demandPoints, round, hour);
                }

        function closeHourModal() {
            document.getElementById('hourModal').classList.remove('open');
            if (hourSupplyChartInstance) {
                try { hourSupplyChartInstance.destroy(); } catch (e) { }
                hourSupplyChartInstance = null;
            }

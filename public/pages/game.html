        // ══════════════════════════════════════════════
        // RENDER
        // ══════════════════════════════════════════════
        function renderRoundNav() {
            const nav = document.getElementById('roundNav');
            if (!nav) {
                console.error('Round nav element not found');
                return;
            }

            const cr = session.currentRound;
            const nr = session.numRounds;

            console.log('Rendering round nav. Current round:', cr, 'Total rounds:', nr);

            let html = '<span class="rnav-label">Dienos:</span>';
            for (let r = 1; r <= nr; r++) {
                let cls = 'rbtn';
                if (r === cr) {
                    cls += ' current';
                } else if (r < cr) {
                    cls += ' past';
                }
                const lock = r < cr ? '🔒 ' : '';
                const viewingClass = (r === viewRound) ? ' viewing' : '';
                html += `<button class="${cls}${viewingClass}" onclick="switchRound(${r})" id="rbtn_${r}">${lock} D${r}</button>`;
            }
            nav.innerHTML = html;
            console.log('Round nav HTML set:', html);
        }

        function switchRound(r) {
            // Save current draft bids before switching
            if (viewRound === session.currentRound && !editingSubmitted) {
                saveDraftRows(viewRound);
            }
            viewRound = r;
            editingSubmitted = false;

            // Force reload market prices for the selected round
            renderRound();
        }

        function saveDraftRows(round) {
            if (!myTeam.bidRows) myTeam.bidRows = {};
            const rows = [];
            for (let i = 0; i < NUM_HOURS; i++) {
                const hourBids = [];
                let bidIdx = 0;
                while (true) {
                    const p = document.getElementById('price_' + i + '_' + bidIdx);
                    if (!p) break;
                    const m = document.getElementById('mw_' + i + '_' + bidIdx);
                    const t = document.getElementById('type_' + i + '_' + bidIdx);
                    const price = p ? +p.value || 0 : 0;
                    const mw = m ? +m.value || 0 : 0;
                    if (price && mw) {
                        hourBids.push({ price, mw, type: t ? t.value : 'buy' });
                    }
                    bidIdx++;
                }
                rows.push(hourBids);
            }
            myTeam.bidRows[round] = rows;
        }

        function toggleHourBids(hourId) {
            const content = document.getElementById(hourId);
            const icon = document.getElementById(hourId + '_icon');

            if (content) {
                if (content.style.display === 'none' || content.style.display === '') {
                    content.style.display = 'block';
                    if (icon) icon.textContent = '▼';
                } else {
                    content.style.display = 'none';
                    if (icon) icon.textContent = '▶';
                }
            }
        }

        function addBidToHour(hour) {
            const container = document.getElementById('hour_' + viewRound + '_' + hour);
            if (!container) return;

            const detailItems = container.querySelectorAll('.bid-detail-item');
            const bidIdx = detailItems.length;

            if (bidIdx >= 3) {
                toast('Maksimalus 3 pasiūlymai per valandą');
                return;
            }

            const newBid = document.createElement('div');
            newBid.className = 'bid-detail-item';
            newBid.id = 'bid_' + hour + '_' + bidIdx;
            newBid.innerHTML = `
            <span style="color:#aaa;">↳</span>
            <span style="color:#888;">#${bidIdx + 1}</span>
            <input class="bid-input" type="number" id="price_${hour}_${bidIdx}" placeholder="Kaina" min="0" step="0.01" oninput="onBidInput(${hour})">
            <input class="bid-input" type="number" id="mw_${hour}_${bidIdx}" placeholder="MW" min="0" step="1" oninput="onBidInput(${hour})">
            <select class="bid-select" id="type_${hour}_${bidIdx}" onchange="onBidInput(${hour})">
              <option value="buy">Pirkti</option>
              <option value="sell">Parduoti</option>
            </select>
            <button class="bid-remove-btn" onclick="removeBidFromHour(${hour}, ${bidIdx})">×</button>
          `;

            container.appendChild(newBid);
            onBidInput(hour);
        }

        function removeBidFromHour(hour, bidIdx) {
            const bidEl = document.getElementById('bid_' + hour + '_' + bidIdx);
            if (bidEl) bidEl.remove();

            // Renumber remaining bids
            const container = document.getElementById('hour_' + viewRound + '_' + hour);
            if (container) {
                const items = container.querySelectorAll('.bid-detail-item');
                items.forEach((item, idx) => {
                    const numSpan = item.querySelector('span:nth-child(2)');
                    if (numSpan) numSpan.textContent = '#' + (idx + 1);

                    // Update IDs
                    const oldIdx = item.id.split('_').pop();
                    item.id = 'bid_' + hour + '_' + idx;

                    const priceInput = item.querySelector('input[type="number"]');
                    const mwInput = item.querySelectorAll('input[type="number"]')[1];
                    const typeSelect = item.querySelector('select');
                    const removeBtn = item.querySelector('button');

                    if (priceInput) priceInput.id = 'price_' + hour + '_' + idx;
                    if (mwInput) mwInput.id = 'mw_' + hour + '_' + idx;
                    if (typeSelect) typeSelect.id = 'type_' + hour + '_' + idx;
                    if (removeBtn) removeBtn.onclick = () => removeBidFromHour(hour, idx);
                });
            }

            onBidInput(hour);
        }

        function renderRound() {
            const cr = session.current_round || session.currentRound || 1;
            const isReadOnly = viewRound < cr;
            const isFuture = viewRound > cr;

            // Use session.rounds if it exists, fallback to stub
            const backendRound = (session.rounds || []).find(h => h.round_number === viewRound);
            const mp = backendRound ? (backendRound.clearing_price || 0) : (session.market_price || session.marketPrice || 0);
            const demand = backendRound ? (backendRound.total_volume_cleared || 0) : (session.demand || 0);
            const weather = session.weather || '';

            // Ensure hourly prices exist for this round (fallback to flat market price)
            if (!session.marketPrices) session.marketPrices = {};
            if (!session.marketPrices[viewRound]) {
                session.marketPrices[viewRound] = Array(NUM_HOURS).fill(session.market_price || 70);
            }

            const savedRows = (myTeam.bidRows || {})[viewRound] || Array(NUM_HOURS).fill(null).map(() => []);
            const isSubmitted = (myTeam.bids || []).some(b => b.round === viewRound && b.submitted);
            const canEdit = isSubmitted && !isReadOnly && session.roundStarted;
            const isEditing = editingSubmitted && canEdit;
            const disabled = isReadOnly || isFuture || (isSubmitted && !isEditing);

            const betsHdr = document.getElementById('betsHdr');
            if (session.betsOpen && !isReadOnly) {
                betsHdr.className = 'bets-status-hdr bets-open-hdr';
                betsHdr.textContent = 'Galima statyti';
            } else {
                betsHdr.className = 'bets-status-hdr bets-closed-hdr';
                betsHdr.textContent = 'Negalima statyti';
            }

            const acc = getAccumulation(viewRound);

            // Try to find profit for this specific round for this team from transactions
            let roundProfit = 0;
            if (isReadOnly) {
                const myTxs = (session.transactions || []).filter(tx => tx.round === viewRound && (tx.teamName === myTeam.name || tx.teamId === myTeam.id));
                if (myTxs.length > 0) {
                    let buyCost = 0, sellRev = 0, netBuy = 0, netSell = 0;
                    myTxs.forEach(tx => {
                        if (tx.type === 'buy') { buyCost += tx.mw * tx.price; netBuy += tx.mw; }
                        else { sellRev += tx.mw * tx.price; netSell += tx.mw; }
                    });
                    const net = netBuy - netSell;
                    roundProfit = Math.round(sellRev - buyCost + net * (session.market_price || session.marketPrice || 70));
                } else if (myTeam.roundHistory) {
                    const rhMatch = myTeam.roundHistory.find(r => r.round === viewRound);
                    if (rhMatch) roundProfit = rhMatch.profit;
                }
            }
            const roundResult = isReadOnly ? { profit: roundProfit } : null;

            // Calculate battery state for each hour
            let currentBattery = myTeam.batteryStored || 0;
            const batteryCapacity = myTeam.batteryCapacity || session.maxPower || 100;
            const batteryHistory = [currentBattery]; // Start with initial

            for (let i = 0; i < savedRows.length; i++) {
                const hourBids = savedRows[i];
                let netMW = 0;
                if (hourBids && hourBids.length) {
                    for (const bid of hourBids) {
                        if (bid && bid.price) {
                            if (bid.type === 'buy') netMW += bid.mw;
                            else if (bid.type === 'sell') netMW -= bid.mw;
                        }
                    }
                }
                currentBattery += netMW;
                currentBattery = Math.min(Math.max(currentBattery, 0), batteryCapacity);
                batteryHistory.push(currentBattery);
            }

            // Calculate average market price for the selected round
            const selectedRoundPrices = session.marketPrices[viewRound] || Array(24).fill(session.market_price || 70);
            const avgPrice = selectedRoundPrices.reduce((a, b) => a + b, 0) / 24;

            // Calculate total demand for the selected round (if available from backend)
            let totalDemand = 0;
            if (backendRound && backendRound.total_volume_cleared) {
                totalDemand = backendRound.total_volume_cleared;
            } else if (session.marketPrices[viewRound]) {
                // Estimate demand from prices (rough approximation)
                totalDemand = Math.round(session.base_demand_mw || 500);
            } else {
                totalDemand = session.demand || 0;
            }

            // Calculate round profit for the selected round
            let roundProfitDisplay = null;
            if (isReadOnly) {
                let profit = 0;
                const myTxs = (session.transactions || []).filter(tx => tx.round === viewRound && (tx.teamName === myTeam.name || tx.teamId === myTeam.id));
                if (myTxs.length > 0) {
                    let buyCost = 0, sellRev = 0, netBuy = 0, netSell = 0;
                    myTxs.forEach(tx => {
                        if (tx.type === 'buy') { buyCost += tx.mw * tx.price; netBuy += tx.mw; }
                        else { sellRev += tx.mw * tx.price; netSell += tx.mw; }
                    });
                    const net = netBuy - netSell;
                    profit = Math.round(sellRev - buyCost + net * avgPrice);
                } else if (myTeam.roundHistory) {
                    const rhMatch = myTeam.roundHistory.find(r => r.round === viewRound);
                    if (rhMatch) profit = rhMatch.profit;
                }

                if (profit !== 0) {
                    roundProfitDisplay = {
                        profit: Math.abs(profit),
                        sign: profit >= 0 ? '+' : '-',
                        color: profit >= 0 ? '#27ae60' : '#e74c3c'
                    };
                }
            }


            document.getElementById('mainContent').innerHTML = `
            <div class="readonly-banner ${isReadOnly ? '' : 'hidden'}">
              Diena ${viewRound} baigta — tik peržiūra.
              <button class="btn btn-sec" style="padding:2px 8px;font-size:11px;margin-left:6px;" onclick="switchRound(${cr})">→ D${cr}</button>
            </div>

            <!-- CHART -->
            <div class="chart-card">
              <div class="chart-card-title">
                <h3>Rinkos kainos — Diena ${viewRound}</h3>
                <span>Spustelėkite ant valandos norėdami matyti išsamią informaciją</span>
              </div>
              <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
              <div class="chart-note">Žalios/raudonos apskritimai = jūsų pasiūlymai (skaičius = MW) · Punktyrinės = juodraštis</div>
            </div>

                <!-- BIDS -->
            <div class="bid-card">
              <div class="bid-card-header">
                <h3>Pasiūlymai — Diena ${viewRound} (24 val.)</h3>
                <div class="bid-actions">
                  ${isSubmitted && !isEditing ? `<span class="bid-submitted-pill">Pateikta</span>
                    ${canEdit ? `<button class="btn btn-warn-sm" onclick="editBids()">Redaguoti</button>` : ''}` : ''}
                  ${isEditing ? '<span class="bid-draft-pill">Redaguojama...</span>' : ''}
                  ${(!disabled || isEditing) && !isReadOnly && !isFuture ? `
                    <button class="btn btn-sec" onclick="clearBids()">Išvalyti</button>
                    <button class="btn btn-primary" onclick="submitBids()" ${session.betsOpen ? '' : 'disabled'}>
                      ${isEditing ? 'Pateikti iš naujo' : (session.betsOpen ? 'Pateikti' : 'Uždaryti')}
                    </button>` : ''}
                </div>
              </div>


              <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;padding:0 4px;">
                  <span style="font-size:10px;background:#fef5e8;color:#e67e22;padding:2px 7px;border-radius:12px;">Pradinė: ${batteryHistory[0].toFixed(0)} MWh</span>
                  <span style="font-size:10px;background:#e8f0fb;color:#2f4a75;padding:2px 7px;border-radius:12px;">Talpa: ${batteryCapacity} MWh</span>
                  <span style="font-size:10px;background:#eaf2ff;color:#2f4a75;padding:2px 7px;border-radius:12px;">Dabartinė vid. kaina: ${avgPrice.toFixed(2)} $/MWh</span>
                  <span style="font-size:10px;background:#e8f8f0;color:#27ae60;padding:2px 7px;border-radius:12px;">Balansas: $${(myTeam.balance || 0).toLocaleString()}</span>
                  ${roundProfitDisplay ? `<span style="font-size:10px;background:${roundProfitDisplay.color === '#27ae60' ? '#e8f8f0' : '#fef5e8'};color:${roundProfitDisplay.color};padding:2px 7px;border-radius:12px;">D${viewRound} pelnas: ${roundProfitDisplay.sign}$${Math.abs(roundProfitDisplay.profit).toLocaleString()}</span>` : ''}
                </div>


              <div class="bid-scroll">
                <div class="bid-row header-row">
                  <span></span><span>Val.</span><span>Net MW</span><span>Iš viso MW</span><span>Statymų #</span><span>Talpa Prieš</span><span>Po</span>
                </div>
                ${savedRows.map((hourBids, hour) => {
                const netMW = hourBids.reduce((sum, b) => sum + (b.type === 'buy' ? b.mw : -b.mw), 0);
                const totalMW = hourBids.reduce((sum, b) => sum + b.mw, 0);
                const bidCount = hourBids.length;
                const batteryBefore = batteryHistory[hour];
                const batteryAfter = batteryHistory[hour + 1];
                const netColor = netMW > 0 ? '#27ae60' : (netMW < 0 ? '#e74c3c' : '#888');
                const netPrefix = netMW > 0 ? '+' : '';
                const hourId = `hour_${viewRound}_${hour}`;

                return `
                    <div style="border-bottom:1px solid #f0ebe0;">
                      <div class="bid-row ${hourBids.length ? 'has-bid' : ''}" onclick="toggleHourBids('${hourId}')">
                        <span class="bid-expand-icon" id="${hourId}_icon">▶</span>
                        <span style="font-weight:600;color:#2f4a75;">${String(hour).padStart(2, '0')}:00</span>
                        <span style="color:${netColor};font-weight:600;">${netPrefix}${netMW} MW</span>
                        <span style="color:#555;">${totalMW} MW</span>
                        <span style="color:#f39c12;">${bidCount}</span>
                        <span style="color:#888;font-weight:600;">${batteryBefore.toFixed(0)}</span>
                        <span style="color:#f39c12;font-weight:600;">${batteryAfter.toFixed(0)}</span>
                      </div>
                      <div id="${hourId}" class="bid-detail-row">
                        <div class="bid-detail-header">
                          <span></span><span>#</span><span>Kaina $/MWh</span><span>Galia MW</span><span>Tipas</span><span></span>
                        </div>
                        ${hourBids.map((bid, bidIdx) => `
                          <div class="bid-detail-item" id="bid_${hour}_${bidIdx}">
                            <span style="color:#aaa;">↳</span>
                            <span style="color:#888;">#${bidIdx + 1}</span>
                            <input class="bid-input" type="number" id="price_${hour}_${bidIdx}" value="${bid.price || ''}" min="0" step="0.01" ${disabled ? 'disabled' : ''} oninput="onBidInput(${hour})">
                            <input class="bid-input" type="number" id="mw_${hour}_${bidIdx}" value="${bid.mw || ''}" min="0" step="1" ${disabled ? 'disabled' : ''} oninput="onBidInput(${hour})">
                            <select class="bid-select" id="type_${hour}_${bidIdx}" ${disabled ? 'disabled' : ''} onchange="onBidInput(${hour})">
                              <option value="buy" ${bid.type === 'buy' ? 'selected' : ''}>Pirkti</option>
                              <option value="sell" ${bid.type === 'sell' ? 'selected' : ''}>Parduoti</option>
                            </select>
                            ${!disabled ? `<button class="bid-remove-btn" onclick="removeBidFromHour(${hour}, ${bidIdx})">×</button>` : '<span></span>'}
                          </div>
                        `).join('')}
                        ${!disabled && hourBids.length < 3 ? `<div style="padding:8px;text-align:center;">
                          <button class="btn btn-sec" style="font-size:11px;padding:4px 12px;" onclick="addBidToHour(${hour})">+ Pridėti pasiūlymą</button>
                        </div>` : ''}
                      </div>
                    </div>
                  `;
            }).join('')}
              </div>
              <div class="bid-footer">
                <span></span><span>IŠ VISO</span>
                <span id="totalNetMW">—</span>
                <span id="totalMW">—</span>
                <span id="totalBids">—</span>
                <span>${(myTeam.batteryStored || 0).toFixed(0)}</span>
                <span id="finalBattery" style="color:#f39c12;">—</span>
              </div>
              <div id="bidErrors" style="margin-top:6px;"></div>
            </div>
            <!-- ENERGY -->
            <div class="energy-card">
              <h3>Energijos portfelis (iki D${viewRound})</h3>
              <div class="energy-grid">
                <div class="ebox highlight"><div class="v">${acc.totalBought}<small style="font-size:9px;"> MWh</small></div><div class="l">Pirkta</div></div>
                <div class="ebox"><div class="v">${acc.totalSold}<small style="font-size:9px;"> MWh</small></div><div class="l">Parduota</div></div>
                <div class="ebox"><div class="v">${acc.net}<small style="font-size:9px;"> MWh</small></div><div class="l">Grynasis</div></div>
                <div class="ebox highlight"><div class="v" style="color:${acc.pnl >= 0 ? '#27ae60' : '#e74c3c'}">${acc.pnl >= 0 ? '+' : ''}$${Math.abs(acc.pnl).toLocaleString()}</div><div class="l">P&amp;L</div></div>
              </div>
            </div>


          `;

            // Render nav highlights
            document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('viewing'));
            const rb = document.getElementById('rbtn_' + viewRound);
            if (rb) rb.classList.add('viewing');

            updateTotals();
            renderChart(viewRound);
        }

        // ══════════════════════════════════════════════
        // BID INTERACTIONS
        // ══════════════════════════════════════════════
        function onBidInput(hour) {
            updateTotals();
            updateEnergyAccumulation();
            // Update draft line on chart
            if (editingSubmitted || !(myTeam.bids || []).some(b => b.round === viewRound && b.submitted)) {
                renderChart(viewRound);
            }
        }

        function updateTotals() {
            let totalNetMW = 0, totalMW = 0, totalBids = 0;

            // Calculate starting battery based on previous days
            let currentBattery;
            if (viewRound === 1) {
                currentBattery = myTeam.batteryStored || 0;
            } else {
                // Calculate previous day's ending battery
                const prevRound = viewRound - 1;
                const prevRoundBids = (myTeam.bidRows || {})[prevRound] || [];
                let prevBattery = myTeam.batteryStored || 0;
                const batteryCapacity = myTeam.batteryCapacity || 100;

                for (let i = 0; i < prevRoundBids.length; i++) {
                    const hourBids = prevRoundBids[i];
                    let netMW = 0;
                    if (hourBids && hourBids.length) {
                        for (const bid of hourBids) {
                            if (bid && bid.price) {
                                if (bid.type === 'buy') netMW += bid.mw;
                                else if (bid.type === 'sell') netMW -= bid.mw;
                            }
                        }
                    }
                    prevBattery += netMW;
                    prevBattery = Math.min(Math.max(prevBattery, 0), batteryCapacity);
                }
                currentBattery = prevBattery;
            }

            const batteryCapacity = myTeam.batteryCapacity || session.maxPower || 100;

            for (let h = 0; h < NUM_HOURS; h++) {
                let bidIdx = 0;
                let hourNetMW = 0, hourTotalMW = 0;

                while (true) {
                    const p = document.getElementById('price_' + h + '_' + bidIdx);
                    if (!p) break;
                    const m = document.getElementById('mw_' + h + '_' + bidIdx);
                    const t = document.getElementById('type_' + h + '_' + bidIdx);

                    const price = +p.value || 0;
                    const mw = +m.value || 0;

                    if (price && mw) {
                        totalBids++;
                        hourTotalMW += mw;
                        if (t && t.value === 'buy') {
                            hourNetMW += mw;
                        } else {
                            hourNetMW -= mw;
                        }
                    }
                    bidIdx++;
                }

                totalNetMW += hourNetMW;
                totalMW += hourTotalMW;

                // Update the row display
                const rowNetEl = document.querySelector(`#hour_${viewRound}_${h}`)?.parentElement?.querySelector('.bid-row span:nth-child(3)');
                const rowTotalEl = document.querySelector(`#hour_${viewRound}_${h}`)?.parentElement?.querySelector('.bid-row span:nth-child(4)');
                const rowCountEl = document.querySelector(`#hour_${viewRound}_${h}`)?.parentElement?.querySelector('.bid-row span:nth-child(5)');
                const rowBeforeEl = document.querySelector(`#hour_${viewRound}_${h}`)?.parentElement?.querySelector('.bid-row span:nth-child(6)');
                const rowAfterEl = document.querySelector(`#hour_${viewRound}_${h}`)?.parentElement?.querySelector('.bid-row span:nth-child(7)');

                const batteryBefore = currentBattery;
                currentBattery += hourNetMW;
                currentBattery = Math.min(Math.max(currentBattery, 0), batteryCapacity);
                const batteryAfter = currentBattery;

                if (rowNetEl) {
                    const netColor = hourNetMW > 0 ? '#27ae60' : (hourNetMW < 0 ? '#e74c3c' : '#888');
                    const netPrefix = hourNetMW > 0 ? '+' : '';
                    rowNetEl.style.color = netColor;
                    rowNetEl.style.fontWeight = '600';
                    rowNetEl.textContent = netPrefix + hourNetMW + ' MW';
                }
                if (rowTotalEl) {
                    rowTotalEl.textContent = hourTotalMW + ' MW';
                }
                if (rowCountEl) {
                    rowCountEl.textContent = bidIdx;
                }
                if (rowBeforeEl) {
                    rowBeforeEl.textContent = batteryBefore.toFixed(0);
                }
                if (rowAfterEl) {
                    rowAfterEl.textContent = batteryAfter.toFixed(0);
                }
            }

            const fb = document.getElementById('finalBattery');
            const tnet = document.getElementById('totalNetMW');
            const tmw = document.getElementById('totalMW');
            const tb = document.getElementById('totalBids');

            if (fb) fb.textContent = currentBattery.toFixed(0);
            if (tnet) tnet.textContent = totalNetMW ? (totalNetMW > 0 ? '+' : '') + totalNetMW + ' MW' : '—';
            if (tmw) tmw.textContent = totalMW ? totalMW + ' MW' : '—';
            if (tb) tb.textContent = totalBids || '—';
        }

        async function updateEnergyAccumulation() {
            if (!myTeam || !myTeam.id) return;
            try {
                const state = await API.Players.getState(myTeam.id);
                const boxes = document.querySelectorAll('.energy-grid .ebox .v');
                // Based on backend TeamStateResponse: {current_battery_mwh, total_profit}
                if (boxes[3]) {
                    boxes[3].style.color = state.total_profit >= 0 ? '#27ae60' : '#e74c3c';
                    boxes[3].textContent = (state.total_profit >= 0 ? '+' : '') + '$' + Math.abs(Math.round(state.total_profit)).toLocaleString();
                }
                if (boxes[2]) boxes[2].textContent = state.current_battery_mwh.toFixed(1) + ' MW';
            } catch (e) {
                console.error('Failed to update stats:', e);
            }
        }

        function editBids() {
            editingSubmitted = true;
            renderRound();
            toast('Redagavimo režimas — pakeiskite ir pateikite iš naujo');
        }

        async function submitBids() {
            if (session.status !== 'active') { toast('Sesija neaktyvi'); return; }

            const errors = [], formattedBids = [];
            let totalBidCount = 0;

            for (let h = 0; h < NUM_HOURS; h++) {
                let bidIdx = 0;
                while (true) {
                    const p = document.getElementById('price_' + h + '_' + bidIdx);
                    if (!p) break;
                    const m = document.getElementById('mw_' + h + '_' + bidIdx);
                    const t = document.getElementById('type_' + h + '_' + bidIdx);

                    const price = +p.value;
                    const mw = +m.value;

                    if (price || mw) {
                        if (!price || price <= 0) errors.push(`${String(h).padStart(2, '0')}:00 #${bidIdx + 1} — netinkama kaina`);
                        else if (!mw || mw <= 0) errors.push(`${String(h).padStart(2, '0')}:00 #${bidIdx + 1} — netinkamas kiekis`);
                        else {
                            formattedBids.push({
                                hour: h,
                                price: price,
                                volume_mwh: mw,
                                bid_type: (t ? t.value : 'buy') === 'buy'
                            });
                            totalBidCount++;
                        }
                    }
                    bidIdx++;
                }
            }

            if (errors.length) {
                toast('Patikrinkite duomenis');
                return;
            }

            if (totalBidCount === 0) { toast('Įveskite bent vieną pasiūlymą'); return; }


            try {
                const currentRoundObj = session.rounds?.find(r => r.status === 'bidding');
                if (!currentRoundObj) {
                    toast('Nėra aktyvaus raundo');
                    return;
                }

                const rid = currentRoundObj.id;
                const submittedBids = await API.Bids.submit(myTeam.id, rid, formattedBids);

                // Update local myTeam with the submitted bids immediately
                if (submittedBids && submittedBids.length) {
                    const currentRound = session.currentRound;

                    // Initialize bidRows for this round if needed
                    if (!myTeam.bidRows[currentRound]) {
                        myTeam.bidRows[currentRound] = Array(24).fill(null).map(() => []);
                    }

                    // Add each submitted bid to local bidRows
                    submittedBids.forEach(bid => {
                        myTeam.bidRows[currentRound][bid.hour].push({
                            price: bid.price,
                            mw: bid.volume_mwh,
                            type: bid.bid_type ? 'buy' : 'sell'
                        });
                    });

                    // Mark this round as submitted
                    if (!myTeam.bids.some(b => b.round === currentRound)) {
                        myTeam.bids.push({ round: currentRound, submitted: true });
                    }
                }

                toast('Pasiūlymai sėkmingai pateikti!');
                editingSubmitted = false;

                // Re-render without reloading the session
                renderRound();
                renderChart(viewRound);

            } catch (err) {
                console.error('Submit error:', err);
                toast('Klaida pateikiant: ' + err.message);
            }
        }

        function saveTeamToSession() {
            try {
                const sessions = JSON.parse(sessionStorage.getItem('adminSessions')) || [];
                const idx = sessions.findIndex(s => s.id === session.id);
                if (idx >= 0) {
                    if (!sessions[idx].marketPrices) sessions[idx].marketPrices = {};
                    Object.assign(sessions[idx].marketPrices, session.marketPrices);
                    const tIdx = sessions[idx].teams.findIndex(t => t.id === myTeam.id);
                    if (tIdx >= 0) sessions[idx].teams[tIdx] = myTeam;
                    else sessions[idx].teams.push(myTeam);
                    sessionStorage.setItem('adminSessions', JSON.stringify(sessions));
                }
            } catch (e) { }
        }
        // excess function
        function buildTxList() {
            const txs = (session.transactions || []).filter(tx => tx.teamId === myTeam.id || tx.teamName === myTeam.name);
            if (!txs.length) return '<p style="color:#bbb;font-size:11px;padding:6px 0;">Nėra sandorių</p>';
            return txs.slice().reverse().map(tx => `
            <div class="tx-row">
              <span class="${tx.type === 'buy' ? 'tx-buy' : 'tx-sell'}">${tx.type === 'buy' ? '▲' : '▼'}</span>
              <span class="tx-info">${tx.mw} MW @ ${tx.price} $/MWh</span>
              <span class="tx-meta">D${tx.round}</span>
            </div>`).join('');
        }

        function getAccumulation(upToRound) {
            let totalBought = 0, totalSold = 0, totalCostBuy = 0, totalRevSell = 0;
            for (let r = 1; r <= upToRound; r++) {
                const rows = (myTeam.bidRows || {})[r] || [];
                rows.forEach(hourBids => {
                    if (!hourBids || !hourBids.length) return;
                    hourBids.forEach(bid => {
                        if (!bid.price || !bid.mw) return;
                        if (bid.type === 'buy') {
                            totalBought += +bid.mw;
                            totalCostBuy += +bid.mw * +bid.price;
                        } else {
                            totalSold += +bid.mw;
                            totalRevSell += +bid.mw * +bid.price;
                        }
                    });
                });
            }
            const net = totalBought - totalSold;
            const pnl = Math.round(totalRevSell - totalCostBuy + net * (session.marketPrice || 70));
            return { totalBought, totalSold, net, pnl };
        }

        // ══════════════════════════════════════════════
        // SIDEBAR / MISC
        // ══════════════════════════════════════════════
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        menuBtn.addEventListener('click', e => { e.stopPropagation(); sidebar.classList.toggle('active'); overlay.classList.toggle('active'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                closeHourModal();
            }
        });
        document.querySelectorAll('.sb-item').forEach(i => i.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); }));
        document.getElementById('hourModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeHourModal(); });

        function nav(p) { window.location.href = p; }
        function logout() { if (confirm('Atsijungti?')) { sessionStorage.removeItem('myTeamId'); sessionStorage.removeItem('gamePin'); window.location.href = '/pages/join.html'; } }
        function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2800); }

        async function init() {
            await loadSession();

            if (!session || !myTeam) {
                console.error('Session or team not loaded');
                return;
            }

            viewRound = session.currentRound || 1;
            const tb = document.getElementById('teamBadge');
            if (tb) tb.textContent = myTeam.name;

            renderRoundNav();

            renderRound();

            const sid = sessionStorage.getItem(KEYS.SESSION_ID);
            if (sid) {
                startPlayerWS(sid);
            }
        }

        async function refreshBalance() {
            if (!myTeam || !myTeam.id) return;
            try {
                const state = await API.Players.getState(myTeam.id);
                if (state && state.total_profit !== undefined) {
                    myTeam.balance = state.total_profit;

                    // Update balance display in the UI
                    const balanceElements = document.querySelectorAll('.stat-chip .v');
                    balanceElements.forEach(el => {
                        if (el.textContent.includes('$')) {
                            el.textContent = `$${myTeam.balance.toLocaleString()}`;
                            el.style.color = '#27ae60';
                        }
                    });

                    // Update the bids card header balance
                    const balanceChip = document.querySelector('.bid-card .bid-card-header + div span:last-child');
                    if (balanceChip && balanceChip.textContent.includes('Balansas')) {
                        const balanceSpan = balanceChip.parentElement;
                        if (balanceSpan) {
                            balanceSpan.innerHTML = `Balansas: $${myTeam.balance.toLocaleString()}`;
                        }
                    }
                }
            } catch (e) {
                console.warn('Failed to refresh balance:', e);
            }
        }
        let playerWS = null;
        function startPlayerWS(sessionId) {
            if (playerWS) return;
            try {
                playerWS = window.WS.open(sessionId, {
                    onMessage: async (data) => {
                        console.log('[PlayerWS] Message:', data);
                        if (['SESSION_STARTED', 'ROUND_CALCULATED', 'NEW_ROUND', 'SESSION_FINISHED'].includes(data.event)) {
                            if (data.event === 'NEW_ROUND') {
                                toast('Naujas raundas!');
                            } else if (data.event === 'ROUND_CALCULATED') {
                                toast('Raundo rezultatai apskaičiuoti!');
                                await refreshBalance();
                            }
                            await loadSession();
                            if (data.event === 'NEW_ROUND' && session && session.current_round) {
                                viewRound = session.current_round;
                            }
                            renderRoundNav();
                            renderRound();
                        }
                    }
                });
            } catch (e) {
                console.warn('WS Init failed:', e);
            }
        }

        init();
    </script>
</body>

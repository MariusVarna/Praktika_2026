<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Pavadinimas</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.0/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background: linear-gradient(135deg,#f5f1e8 0%,#f0ebe0 100%);
            background-attachment: fixed;
            color: #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 50 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25 2L41.5 11V29L25 38L8.5 29V11Z' fill='none' stroke='%23d4cec2' stroke-width='0.5' opacity='0.5'/%3E%3C/svg%3E");
                background-size: 50px 50px;
                pointer-events: none;
                z-index: 0;
            }

            body > * {
                position: relative;
                z-index: 1;
            }

        header {
            background: linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
            flex-shrink: 0;
            z-index: 50;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 6px;
            border-radius: 7px;
            transition: background .2s;
            line-height: 1;
        }

            .menu-btn:hover {
                background: rgba(255,255,255,.1);
            }

        .logo {
            color: white;
            font-size: 15px;
            font-weight: 700;
        }

        .badge-admin {
            background: rgba(255,165,0,.3);
            color: #ffd78a;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            border: 1px solid rgba(255,165,0,.4);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hbtn {
            background: rgba(255,255,255,.15);
            border: none;
            color: white;
            padding: 5px 11px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background .2s;
            white-space: nowrap;
        }

            .hbtn:hover {
                background: rgba(255,255,255,.25);
            }

        .sidebar {
            position: fixed;
            left: 0;
            top: 56px;
            width: 240px;
            height: calc(100vh - 56px);
            background: white;
            border-right: 1px solid #e0d9cc;
            z-index: 100;
            transform: translateX(-100%);
            transition: transform .35s cubic-bezier(.4,0,.2,1);
            overflow-y: auto;
            box-shadow: 2px 0 8px rgba(0,0,0,.1);
        }

            .sidebar.active {
                transform: translateX(0);
            }

        .sb-head {
            padding: 14px 18px;
            border-bottom: 1px solid #e0d9cc;
            background: #fafaf8;
        }

            .sb-head h2 {
                font-size: 14px;
                font-weight: 700;
                color: #2f4a75;
            }

        .sb-item {
            padding: 12px 18px;
            cursor: pointer;
            transition: all .18s;
            color: #555;
            font-weight: 500;
            font-size: 13px;
            border-left: 3px solid transparent;
        }

            .sb-item:hover {
                background: #f5f1e8;
                color: #2f4a75;
                border-left-color: #2f4a75;
                padding-left: 22px;
            }

        .overlay {
            position: fixed;
            top: 56px;
            left: 0;
            width: 100%;
            height: calc(100vh - 56px);
            background: rgba(0,0,0,0);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: all .3s;
        }

            .overlay.active {
                background: rgba(0,0,0,.4);
                opacity: 1;
                pointer-events: all;
            }

        .tab-bar {
            display: flex;
            background: white;
            border-bottom: 2px solid #e0d9cc;
            flex-shrink: 0;
            overflow-x: auto;
            z-index: 10;
        }

            .tab-bar::-webkit-scrollbar {
                height: 0;
            }

        .tbtn {
            padding: 10px 16px;
            background: none;
            border: none;
            color: #888;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all .18s;
        }

            .tbtn.active {
                color: #2f4a75;
                border-bottom-color: #2f4a75;
            }

        .tab-content {
            display: none;
        }

            .tab-content.active {
                display: block;
            }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
            border: 1px solid #e8dfd4;
        }

            .card h2 {
                font-size: 16px;
                font-weight: 700;
                color: #2f4a75;
                margin-bottom: 10px;
            }

            .card h3 {
                font-size: 13px;
                font-weight: 700;
                color: #2f4a75;
                margin-bottom: 8px;
            }

        .fg {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

            .fg.full {
                grid-template-columns: 1fr;
            }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #666;
            margin-bottom: 3px;
        }

        input[type=text], input[type=number], input[type=email], input[type=password], select {
            width: 100%;
            padding: 7px 10px;
            border: 1.5px solid #d4cec2;
            border-radius: 7px;
            background: #fafaf8;
            color: #333;
            font-size: 12px;
            transition: all .18s;
        }

            input:focus, select:focus {
                outline: none;
                border-color: #2f4a75;
                background: white;
                box-shadow: 0 0 0 2px rgba(47,74,117,.12);
            }

        .btn {
            padding: 7px 13px;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all .18s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);
            color: white;
        }

            .btn-primary:hover {
                transform: translateY(-1px);
                box-shadow: 0 3px 10px rgba(47,74,117,.3);
            }

        .btn-danger {
            background: linear-gradient(135deg,#e74c3c 0%,#c0392b 100%);
            color: white;
        }

            .btn-danger:hover {
                transform: translateY(-1px);
            }

        .btn-success {
            background: linear-gradient(135deg,#27ae60 0%,#1e8449 100%);
            color: white;
        }

            .btn-success:hover {
                transform: translateY(-1px);
            }

        .btn-warn {
            background: linear-gradient(135deg,#e67e22 0%,#ca6f1e 100%);
            color: white;
        }

            .btn-warn:hover {
                transform: translateY(-1px);
            }

        .btn-sec {
            background: #e8dfd4;
            color: #555;
        }

            .btn-sec:hover {
                background: #ddd5c8;
            }

        .btn-xs {
            padding: 4px 8px;
            font-size: 11px;
        }

        .btn-sm {
            padding: 6px 11px;
            font-size: 12px;
        }

        .btn-full {
            width: 100%;
            margin-top: 8px;
        }

        .btn-grp {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn-start-round {
            background: linear-gradient(135deg,#27ae60,#1e8449);
            color: white;
            padding: 9px 18px;
            font-size: 13px;
            font-weight: 700;
        }

        .btn-end-round {
            background: linear-gradient(135deg,#e74c3c,#c0392b);
            color: white;
            padding: 9px 18px;
            font-size: 13px;
            font-weight: 700;
        }

        .sc {
            border: 1px solid #e0d9cc;
            border-radius: 10px;
            padding: 12px;
            background: #fafaf8;
            margin-bottom: 8px;
        }

            .sc:last-child {
                margin-bottom: 0;
            }

        .sc-hd {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .sc-name {
            font-weight: 700;
            color: #2f4a75;
            font-size: 14px;
        }

        .sc-sub {
            font-size: 10px;
            color: #999;
            margin-top: 2px;
        }

        .pin-badge {
            font-family: 'Courier New',monospace;
            font-size: 18px;
            font-weight: 700;
            color: #2f4a75;
            letter-spacing: 5px;
            text-align: center;
            padding: 8px;
            background: #e8f0fb;
            border-radius: 7px;
            margin: 6px 0;
        }

        .dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .dot-waiting {
            background: #f39c12;
        }

        .dot-active {
            background: #27ae60;
        }

        .dot-finished {
            background: #999;
        }

        .sr {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #f0ebe0;
            font-size: 12px;
        }

            .sr:last-child {
                border-bottom: none;
            }

        .sl {
            color: #777;
        }

        .sv {
            color: #2f4a75;
            font-weight: 600;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media(max-width:680px) {
            .two-col {
                grid-template-columns: 1fr;
            }
        }

        .rc {
            background: linear-gradient(135deg,#eaf2ff,#ddeeff);
            border: 1px solid #b8d4f8;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }

            .rc h3 {
                color: #1f3a55;
                margin-bottom: 8px;
                font-size: 13px;
            }

        .rc-stats {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        @media(max-width:480px) {
            .rc-stats {
                grid-template-columns: repeat(2,1fr);
            }
        }

        .rc-stat {
            background: white;
            border-radius: 7px;
            padding: 7px;
            text-align: center;
            border: 1px solid #d4e8ff;
        }

            .rc-stat .v {
                font-size: 18px;
                font-weight: 700;
                color: #2f4a75;
            }

            .rc-stat .l {
                font-size: 9px;
                color: #888;
                text-transform: uppercase;
                letter-spacing: .3px;
            }

        .bets-pill {
            border-radius: 7px;
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            display: inline-block;
        }

        .bets-open-p {
            background: #e8f8f0;
            color: #1e8449;
            border: 1px solid #a9dfbf;
        }

        .bets-closed-p {
            background: #fef9e7;
            color: #d68910;
            border: 1px solid #f9e79f;
        }

        .scroll-panel {
            max-height: 210px;
            overflow-y: scroll;
            margin-top: 4px;
        }

            .scroll-panel::-webkit-scrollbar {
                width: 4px;
            }

            .scroll-panel::-webkit-scrollbar-thumb {
                background: #d4cec2;
                border-radius: 3px;
            }

        .up {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            background: #fafaf8;
            border: 1px solid #e8dfd4;
            border-radius: 7px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: background .15s;
        }

            .up:last-child {
                margin-bottom: 0;
            }

            .up:hover {
                background: #f0ebe0;
            }

        .ua {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg,#2f4a75,#1f3a55);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 9px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .un {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ub {
            font-size: 11px;
            font-weight: 700;
            color: #27ae60;
        }

        .online-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #27ae60;
            flex-shrink: 0;
        }

        .bid-summary {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .bid-chip {
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .bc-sub {
            background: #e8f8f0;
            color: #1e8449;
            border: 1px solid #a9dfbf;
        }

        .bc-dft {
            background: #fef9e7;
            color: #d68910;
            border: 1px solid #f9e79f;
        }

        .bc-non {
            background: #f5f1e8;
            color: #999;
            border: 1px solid #e0d9cc;
        }

        .bs-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            background: #fafaf8;
            border: 1px solid #e8dfd4;
            border-radius: 7px;
            margin-bottom: 4px;
            font-size: 11px;
        }

            .bs-row:last-child {
                margin-bottom: 0;
            }

        .bs-name {
            flex: 1;
            font-weight: 600;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bs-detail {
            color: #888;
            font-size: 10px;
            flex-shrink: 0;
        }

        .tx-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 6px;
            border-bottom: 1px solid #f5f1e8;
            font-size: 11px;
        }

            .tx-row:last-child {
                border-bottom: none;
            }

        .tx-buy {
            color: #27ae60;
            font-weight: 700;
        }

        .tx-sell {
            color: #e74c3c;
            font-weight: 700;
        }

        .tx-info {
            flex: 1;
            color: #555;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tx-meta {
            color: #bbb;
            flex-shrink: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f5f1e8;
        }

        th {
            padding: 7px 8px;
            text-align: left;
            font-size: 10px;
            font-weight: 700;
            color: #2f4a75;
            text-transform: uppercase;
            letter-spacing: .3px;
        }

        td {
            padding: 7px 8px;
            border-bottom: 1px solid #f0ebe0;
            font-size: 11px;
            color: #555;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #fafaf8;
        }

        .chart-wrap {
            position: relative;
            height: 220px;
            margin-top: 8px;
        }

        .chart-card-wide {
            background: white;
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            border: 1px solid #e8dfd4;
            margin-bottom: 12px;
        }

            .chart-card-wide h3 {
                font-size: 13px;
                font-weight: 700;
                color: #2f4a75;
                margin-bottom: 8px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

        .modal-bd {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 200;
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding: 16px;
            overflow-y: auto;
        }

            .modal-bd.open {
                display: flex;
            }

        .modal {
            background: white;
            border-radius: 14px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
            margin: auto;
        }

        .modal-hd {
            padding: 13px 16px;
            border-bottom: 1px solid #e0d9cc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
            border-radius: 14px 14px 0 0;
        }

            .modal-hd h2 {
                font-size: 14px;
                font-weight: 700;
                color: #2f4a75;
            }

        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            line-height: 1;
            padding: 2px;
        }

        .modal-body {
            padding: 14px 16px;
            max-height: 82vh;
            overflow-y: auto;
        }

        .pgv-rounds {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 2px 0;
            margin-bottom: 10px;
        }

            .pgv-rounds::-webkit-scrollbar {
                height: 0;
            }

        .pgv-rbtn {
            padding: 4px 10px;
            border: 1.5px solid #d4cec2;
            border-radius: 20px;
            background: white;
            font-size: 11px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all .15s;
        }

            .pgv-rbtn.active {
                background: #2f4a75;
                color: white;
                border-color: #2f4a75;
            }

            .pgv-rbtn.past {
                color: #bbb;
            }

        .pgv-energy {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        .pgv-ebox {
            background: #f9f7f3;
            border: 1px solid #e0d9cc;
            border-radius: 7px;
            padding: 8px;
            text-align: center;
        }

            .pgv-ebox .v {
                font-size: 13px;
                font-weight: 700;
                color: #2f4a75;
            }

            .pgv-ebox .l {
                font-size: 9px;
                color: #888;
                margin-top: 2px;
            }

        .proj-screen {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 18px;
            color: white;
            margin-bottom: 10px;
        }

        .proj-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 3px;
            color: #a8d8ff;
        }

        .proj-sub {
            font-size: 11px;
            text-align: center;
            color: #888;
            margin-bottom: 14px;
        }

        .proj-table {
            width: 100%;
            border-collapse: collapse;
        }

            .proj-table th {
                padding: 7px 9px;
                font-size: 10px;
                font-weight: 700;
                color: #999;
                text-align: left;
                border-bottom: 1px solid rgba(255,255,255,.12);
                text-transform: uppercase;
            }

            .proj-table td {
                padding: 7px 9px;
                font-size: 12px;
                border-bottom: 1px solid rgba(255,255,255,.06);
            }

            .proj-table tr:last-child td {
                border-bottom: none;
            }

        .proj-market {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,.1);
        }

        .proj-mstat {
            text-align: center;
        }

            .proj-mstat .v {
                font-size: 16px;
                font-weight: 700;
                color: #a8d8ff;
            }

            .proj-mstat .l {
                font-size: 9px;
                color: #888;
                margin-top: 2px;
            }

        .proj-rd {
            margin-top: 12px;
        }

            .proj-rd h3 {
                font-size: 11px;
                color: #888;
                margin-bottom: 6px;
                text-transform: uppercase;
                letter-spacing: .5px;
            }

            .proj-rd table th {
                padding: 5px 7px;
                font-size: 9px;
            }

            .proj-rd table td {
                padding: 5px 7px;
                font-size: 11px;
            }

        .c-pos {
            color: #7effc0;
            font-weight: 700;
        }

        .c-neg {
            color: #ff8080;
            font-weight: 700;
        }

        .c-blue {
            color: #a8d8ff;
            font-weight: 700;
        }

        .c-white {
            color: white;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 14px;
            right: 14px;
            background: #2f4a75;
            color: white;
            padding: 8px 13px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            z-index: 500;
            opacity: 0;
            transform: translateY(6px);
            transition: all .22s;
            pointer-events: none;
        }

            .toast.show {
                opacity: 1;
                transform: translateY(0);
            }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4cec2;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-btn" id="menuBtn">☰</button>
            <span class="logo">Pavadinimas</span>
            <span class="badge-admin">ADMIN</span>
        </div>
        <div class="header-right">
            <button class="hbtn" onclick="logout()">Atsijungti</button>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="sb-head"><h2>Navigacija</h2></div>
        <div class="sb-item" onclick="nav('/pages/admin.html')">Administravimas</div>
        <div class="sb-item" onclick="nav('/pages/join.html')">Prisijungimas</div>
        <div class="sb-item" onclick="nav('/pages/help.html')">Žinynas</div>
        <div class="sb-item" onclick="nav('/pages/settings.html')">Parinktys</div>
    </div>
    <div class="overlay" id="overlay"></div>

    <div class="tab-bar">
        <button class="tbtn active" onclick="switchTab('create',this)">➕ Nauja</button>
        <button class="tbtn" onclick="switchTab('active',this)">▶ Aktyvios</button>
        <button class="tbtn" id="manageTabBtn" onclick="switchTab('manage',this)" style="display:none">Valdymas</button>
        <button class="tbtn" onclick="switchTab('previous',this)">Ankstesnės</button>
    </div>

    <main>
        <!-- CREATE -->
        <div id="create" class="tab-content active">
            <div class="card">
                <h2>Sukurti naują sesiją</h2>
                <div class="fg full"><div><label>Žaidimo pavadinimas</label><input type="text" id="gameName" placeholder="pvz. Elektros rinka 2026"></div></div>
                <div class="fg">
                    <div><label>Pradžios diena</label><input type="number" id="startDay" value="1" min="1"></div>
                    <div><label>Raundų skaičius</label><input type="number" id="numRounds" value="5" min="1" max="20"></div>
                </div>
                <div class="fg">
                    <div><label>Maks. galia (MW)</label><input type="number" id="maxPower" value="100" min="1"></div>
                    <div><label>Pralaidumas (MW)</label><input type="number" id="bandwidth" value="50" min="1"></div>
                </div>
                <div class="fg">
                    <div><label>Efektyvumas (%)</label><input type="number" id="efficiency" value="85" min="1" max="100"></div>
                    <div><label>Bauda ($/MWh)</label><input type="number" id="penaltyPrice" value="150" min="1"></div>
                </div>
                <button class="btn btn-primary btn-full" onclick="createSession()">Sukurti sesiją</button>
            </div>
        </div>

        <!-- ACTIVE LIST -->
        <div id="active" class="tab-content"><div id="activeList"></div></div>

        <!-- MANAGE -->
        <div id="manage" class="tab-content"><div id="manageContent"></div></div>

        <!-- PREVIOUS -->
        <div id="previous" class="tab-content"><div id="previousList"></div></div>
    </main>

    <!-- INTERIM RESULTS MODAL -->
    <div class="modal-bd" id="projectorModal">
        <div class="modal" style="max-width:660px;">
            <div class="modal-hd">
                <h2>Tarpiniai rezultatai </h2>
                <button class="modal-close" onclick="closeModal('projectorModal')">×</button>
            </div>
            <div class="modal-body" id="projectorBody"></div>
        </div>
    </div>

    <!-- PLAYER GAME VIEW MODAL -->
    <div class="modal-bd" id="playerModal">
        <div class="modal">
            <div class="modal-hd">
                <h2 id="playerModalTitle">Žaidėjo ekranas</h2>
                <button class="modal-close" onclick="closeModal('playerModal')">×</button>
            </div>
            <div class="modal-body" id="playerModalBody"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/js/api.js"></script>
    <script>
        // ── STATE ──────────────────────────────────────
        let selectedRound = null;
        let sessions = [], prevSessions = [], activeSessionId = null;

        function saveState() {
            // Local persistence is now handled by the Backend.
            // We just trigger renders here.
            renderActiveSessions();
            renderPreviousSessions();
        }

        async function loadState() {
            try {
                const results = await API.Sessions.getMy();
                // Map backend fields to frontend UI expectations
                const mapSession = s => {
                    const latestRound = s.rounds && s.rounds.length ? s.rounds[s.rounds.length - 1] : null;
                    const roundStatus = latestRound ? latestRound.status : null; // 'bidding' or 'calculated'
                    const betsOpen = roundStatus === 'bidding';
                    
                    return {
                        ...s,
                        pin: s.join_code,
                        gameName: s.game_name,
                        numRounds: s.duration_days,
                        currentRound: s.current_round,
                        currentDay: s.current_day,
                        marketPrice: s.market_price || 0,
                        demand: s.demand || 0,
                        weather: s.weather || '',
                        createdAt: new Date(s.created_at).toLocaleString('lt-LT', { dateStyle: 'short', timeStyle: 'short' }),
                        teams: s.teams || [],
                        transactions: s.transactions || [],
                        roundStatus: roundStatus,
                        betsOpen: betsOpen,
                        round_id: latestRound ? latestRound.id : null
                    };
                };
                sessions = results.filter(s => s.status !== 'finished').map(mapSession);
                prevSessions = results.filter(s => s.status === 'finished').map(mapSession);

                // Initialize real-time updates
                sessions.forEach(s => startAdminWS(s.id));
                saveState();
            } catch (e) {
                console.error('Failed to load sessions:', e);
                toast('Klaida užkraunant duomenis');
            }
        }

        let adminWS = {};
        function startAdminWS(sessionId) {
            if (adminWS[sessionId]) return;
            try {
                adminWS[sessionId] = window.WS.open(sessionId, {
                    onMessage: (data) => {
                        console.log('[AdminWS] Message:', data);
                        if (data.event === 'TEAM_JOINED' || data.event === 'BID_SUBMITTED') {
                            loadState(); // Refresh everything
                        }
                    }
                });
            } catch (e) { console.error('WS failed', e); }
        }

        // ── SIDEBAR ────────────────────────────────────
        const menuBtn = document.getElementById('menuBtn'), sidebar = document.getElementById('sidebar'), overlay = document.getElementById('overlay');
        menuBtn.addEventListener('click', e => { e.stopPropagation(); sidebar.classList.toggle('active'); overlay.classList.toggle('active'); });
        overlay.addEventListener('click', () => closeSidebar());
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeSidebar(); closeAllModals(); } });
        document.querySelectorAll('.sb-item').forEach(i => i.addEventListener('click', closeSidebar));
        function closeSidebar() { sidebar.classList.remove('active'); overlay.classList.remove('active'); }

        // ── TABS ───────────────────────────────────────
        function switchTab(name, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            if (el) el.classList.add('active');
        }

        async function createSession() {
            const gn = document.getElementById('gameName').value.trim();
            if (!gn) { toast('Įveskite žaidimo pavadinimą'); return; }
            
            const payload = {
                gameName: gn,
                startDay: +document.getElementById('startDay').value || 1,
                numRounds: +document.getElementById('numRounds').value || 5,
                maxPower: +document.getElementById('maxPower').value || 100,
                bandwidth: +document.getElementById('bandwidth').value || 50,
                efficiency: +document.getElementById('efficiency').value || 85,
                penaltyPrice: +document.getElementById('penaltyPrice').value || 150,
                startBudget: +document.getElementById('startBudget')?.value || 10000,
                penaltyK: 0.5,
                penaltyB: 5.0
            };

            try {
                const newSession = await API.Sessions.create(payload);
                toast('Sesija sukurta! PIN: ' + newSession.join_code);
                document.getElementById('gameName').value = '';
                await loadState();
                switchTab('active', document.querySelectorAll('.tbtn')[1]);
            } catch (err) {
                toast('Klaida kūrant sesiją: ' + err.message);
            }
        }
        // ── ACTIVE LIST ────────────────────────────────
        function renderActiveSessions() {
            const el = document.getElementById('activeList');
            if (!sessions.length) { el.innerHTML = '<div class="card" style="text-align:center;color:#999;padding:24px;">Nėra aktyvių sesijų</div>'; return; }
            el.innerHTML = sessions.map(s => `
                <div class="sc">
                  <div class="sc-hd"><div><div class="sc-name">${escapeHtml(s.gameName)}</div><div class="sc-sub"><span class="dot dot-${s.status}"></span>${statusLabel(s.status)} · ${s.createdAt}</div></div><div style="font-size:11px;color:#888;">R${s.currentRound}/${s.numRounds}</div></div>
                  <div class="pin-badge">${s.pin}</div>
                  <div class="sr"><span class="sl">Komandos</span><span class="sv">${s.teams.length}</span></div>
                  <div class="sr"><span class="sl">Diena</span><span class="sv">${s.currentDay}</span></div>
                  <div class="btn-grp">
                    ${s.status === 'waiting' ? `<button class="btn btn-success btn-sm" onclick="startSession(${s.id})">▶ Pradėti</button>` : ''}
                    ${s.status === 'active' ? `<button class="btn btn-primary btn-sm" onclick="openManage(${s.id})">🎛 Valdyti</button>` : ''}
                    <button class="btn btn-sec btn-sm" onclick="openManage(${s.id})">👁 Peržiūrėti</button>
                    <button class="btn btn-danger btn-sm" onclick="archiveSession(${s.id})">📁 Archyvuoti</button>
                  </div>
                </div>`).join('');
        }
        // ── MANAGE ─────────────────────────────────────
        function switchAdminRound(round) {
            selectedRound = round;
            renderManage();
        }
        function openManage(id) {
            activeSessionId = id;
            selectedRound = null;
            document.getElementById('manageTabBtn').style.display = '';
            switchTab('manage', document.getElementById('manageTabBtn'));
            renderManage();
        }
        function renderManage() {
            const s = sessions.find(x => x.id === activeSessionId);
            if (!s) { document.getElementById('manageContent').innerHTML = '<div class="card" style="text-align:center;color:#999;">Sesija nerasta</div>'; return; }
            const bs = calcBidStatus(s);
            const isActive = s.status === 'active';
            const currentRound = selectedRound || s.currentRound || 1;

            const roundNavHTML = `
                <div class="pgv-rounds">
                  ${Array.from({ length: s.numRounds }, (_, i) => i + 1).map(r => `
                    <button
                      class="pgv-rbtn ${r === currentRound ? 'active' : ''} ${r < s.currentRound ? 'past' : ''}"
                      onclick="switchAdminRound(${r})">
                      ${r < s.currentRound ? '🔒 ' : ''}D${r}
                    </button>
                  `).join('')}
                </div>
              `;

            document.getElementById('manageContent').innerHTML = `
                ${roundNavHTML}
                <div class="chart-card-wide">
                  <h3>Rinkos kainos — Diena ${currentRound} (24 val.)
                    <span style="font-size:10px;font-weight:500;color:#aaa;">Spustelėkite ant valandos · kiekviena linija = komanda</span>
                  </h3>
                  <div class="chart-wrap"><canvas id="adminChart"></canvas></div>
                </div>
                <div class="card">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;">
                    <div>
                      <h2 style="margin-bottom:2px;">${escapeHtml(s.gameName)}</h2>
                      <div style="font-size:11px;color:#888;">PIN: <strong style="font-family:monospace;letter-spacing:2px;">${s.pin}</strong> · ${statusLabel(s.status)}</div>
                    </div>
                    <button class="btn btn-warn btn-sm" style="flex-shrink:0;align-self:flex-start;" onclick="addExtraRound(${s.id})" title="Pridėti papildomą raundą">➕ Papild. raundas</button>
                  </div>
                  <div class="rc">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                      <h3 style="margin-bottom:0;">Raundo valdymas</h3>
                      <button class="btn btn-primary btn-sm" onclick="openProjector()" style="font-size:11px;">Tarpiniai rezultatai</button>
                    </div>
                    <div class="rc-stats">
                      <div class="rc-stat"><div class="v">${s.currentRound || '—'}</div><div class="l">Diena</div></div>
                      <div class="rc-stat"><div class="v">${s.numRounds}</div><div class="l">Iš viso</div></div>
                      <div class="rc-stat"><div class="v">${s.teams.length}</div><div class="l">Komandos</div></div>
                    </div>
                    <div><span class="bets-pill ${s.betsOpen ? 'bets-open-p' : 'bets-closed-p'}">${s.betsOpen ? '✅ Statymai atidaryti' : '🔒 Statymai uždaryti'}</span></div>
                    <div class="btn-grp" style="margin-top:10px;">
                      ${(s.status === 'waiting' || s.status === 'pending') ? `<button class="btn btn-success btn-lg btn-full" onclick="startSession(${s.id})" style="margin-bottom:12px;font-size:16px;">▶ Pradėti žaidimą</button>` : ''}
                      ${s.status === 'active' && (!s.roundStatus || s.roundStatus === 'calculated') ? `<button class="btn btn-start-round" onclick="goToNextRound(${s.id})">▶ Kitas raundas</button>` : ''}
                      ${s.status === 'active' && s.roundStatus === 'bidding' ? `<button class="btn btn-end-round" onclick="endRound(${s.id})">⏹ Baigti raundą</button>` : ''}
                    </div>
                  </div>
                </div>
                <div class="two-col">
                  <div class="card">
                    <h3>Visos komandos (${s.teams.length})</h3>
                    <div class="scroll-panel">
                      ${s.teams.length ? s.teams.map(t => `
                        <div class="up" onclick="openPlayerModal(${s.id},'${t.id}')">
                          <div class="ua">${t.name.slice(0, 2).toUpperCase()}</div>
                          <span class="un">${escapeHtml(t.name)}</span>
                          <span class="ub">$${(t.balance || 0).toLocaleString()}</span>
                          <span class="ub" style="color:#f39c12;"> ${(t.batteryStored || 0).toFixed(0)}/${t.batteryCapacity || s.maxPower || 100} MW</span>
                          <div class="online-dot"></div>
                        </div>`).join('') : '<p style="color:#bbb;font-size:12px;text-align:center;padding:10px;">Nėra komandų</p>'}
                    </div>
                  </div>
                  <div class="card">
                    <h3>Statymų būsena — R${s.currentRound || '?'}</h3>
                    <div class="bid-summary">
                      <span class="bid-chip bc-sub">✅ ${bs.submitted}</span>
                      <span class="bid-chip bc-dft">✏️ ${bs.draft}</span>
                      <span class="bid-chip bc-non">— ${bs.none}</span>
                    </div>
                    <div class="scroll-panel">
                      ${s.teams.length ? s.teams.map(t => {
                const bid = getCurrentBid(t, s.currentRound);
                const st = bid ? (bid.submitted ? 'submitted' : 'draft') : 'none';
                const icon = { submitted: '✅', draft: '✏️', none: '—' }[st];
                const detail = bid ? `${bid.price}$ · ${bid.mw}MW` : 'nėra';
                return `<div class="bs-row" style="${st === 'none' ? 'opacity:.55' : ''}">
                          <span style="font-size:13px;">${icon}</span>
                          <span class="bs-name">${escapeHtml(t.name)}</span>
                          <span class="bs-detail">${detail}</span>
                          <button class="btn btn-sec btn-xs" onclick="openPlayerModal(${s.id},'${t.id}')">👁</button>
                        </div>`;
            }).join('') : '<p style="color:#bbb;font-size:12px;text-align:center;padding:10px;">Nėra komandų</p>'}
                    </div>
                  </div>
                </div>
                <div class="card">
                  <h3>Statymai</h3>
                  <div class="scroll-panel" style="height:210px; overflow-y: scroll;">
                    ${s.transactions.length ? s.transactions.slice().reverse().map(tx => `
                      <div class="tx-row">
                        <span class="${tx.type === 'buy' ? 'tx-buy' : 'tx-sell'}">${tx.type === 'buy' ? '▲' : '▼'}</span>
                        <span class="tx-info">${escapeHtml(tx.teamName)} · ${tx.mw}MW @ ${tx.price}$</span>
                        <span class="tx-meta">R${tx.round}</span>
                      </div>
                    `).join('') : '<p style="color:#bbb;font-size:12px;text-align:center;padding:10px;">Nėra sandorių</p>'}
                  </div>
                </div>
                <div class="card" style="border-left:4px solid #e74c3c;">
                  <h3 style="color:#e74c3c;">Sesijos valdymas</h3>
                  <div class="btn-grp">
                    <button class="btn btn-danger btn-sm" onclick="finishSession(${s.id})">Baigti sesiją</button>
                    <button class="btn btn-sec btn-sm" onclick="archiveSession(${s.id})">Archyvuoti</button>
                  </div>
                </div>
              `;
            setTimeout(() => renderAdminChart(s), 50);
        }
        // ── ROUND ACTIONS ──────────────────────────────
        async function startRound(id) {
            goToNextRound(id); // Delegates to the robust next round logic
        }

        async function endRound(id) {
            const s = sessions.find(x => x.id === id); if (!s) return;
            const rid = s.round_id || (s.rounds && s.rounds.length ? s.rounds[s.rounds.length-1].id : null);
            if (!rid) { toast('Nerastas raundo ID'); return; }

            try {
                toast('🧮 Skaičiuojami rezultatai...');
                const result = await API.Admin.calculateRound(id, rid);
                toast('✅ Raundas baigtas');
                await loadState();
                renderManage();
                
                if (result.session_finished) {
                    toast('🏁 Sesija baigta!');
                } else {
                    // Auto-advance to next round in state (optional, or wait for explicit click)
                    // await API.Admin.nextRound(id);
                }
            } catch (err) {
                toast('Klaida skaičiuojant: ' + err.message);
            }
        }

        async function goToNextRound(id) {
            try {
                await API.Admin.nextRound(id);
                toast('⏭ Pradedamas naujas raundas');
                await loadState();
                renderManage();
            } catch (err) {
                toast('Klaida pereinant į kitą raundą: ' + err.message);
            }
        }
        function openBets(id) { const s = sessions.find(x => x.id === id); if (!s) return; s.betsOpen = true; saveState(); toast('Statymai atidaryti'); renderManage(); }
        function closeBets(id) { const s = sessions.find(x => x.id === id); if (!s) return; s.betsOpen = false; saveState(); toast('Statymai uždaryti'); renderManage(); }
        function addExtraRound(id) { const s = sessions.find(x => x.id === id); if (!s) return; s.numRounds++; saveState(); toast('Iš viso raundų: ' + s.numRounds); renderManage(); }
        async function startSession(id) {
            try {
                await API.Admin.startSession(id);
                toast('▶ Sesija pradėta!');
                await loadState();
                openManage(id);
            } catch (err) {
                toast('Klaida: ' + err.message);
            }
        }

        async function archiveSession(id) {
            if (!confirm('Ar tikrai norite archyvuoti (ištrinti) šią sesiją?')) return;
            try {
                await API.Sessions.delete(id);
                toast('Sesija archyvuota');
                await loadState();
            } catch (err) {
                toast('Klaida archyvuojant: ' + err.message);
            }
        }
        // ── PLAYER GAME VIEW MODAL ─────────────────────
        function openPlayerModal(sessionId, teamId) {
            const s = sessions.find(x => x.id === sessionId); if (!s) return;
            const t = s.teams.find(x => x.id === teamId); if (!t) return;
            document.getElementById('playerModalTitle').textContent = t.name + ' — žaidimo ekranas';

            if (!s.marketPrices) s.marketPrices = {};
            const NUM_HOURS = 24;
            const cr = s.currentRound, nr = s.numRounds;
            const bids = t.bids || [];
            const totalSubmitted = bids.filter(b => b.submitted).length;
            const totalMWh = bids.filter(b => b.submitted && b.type === 'buy').reduce((sum, b) => sum + b.mw, 0);
            const pnl = Math.round(bids.filter(b => b.submitted && b.type === 'buy').reduce((sum, b) => sum + b.mw * (s.marketPrice - b.price), 0));

            document.getElementById('playerModalBody').innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#f5f1e8;border-radius:8px;margin-bottom:10px;">
                  <div>
                    <div style="font-weight:700;font-size:14px;color:#2f4a75;">${escapeHtml(t.name)}</div>
                    <div style="font-size:10px;color:#888;">Slaptažodis: <code style="background:#e8dfd4;padding:1px 5px;border-radius:4px;">${t.password}</code></div>
                  </div>
                  <div style="text-align:right;">
                    <div style="font-size:18px;font-weight:700;color:#2f4a75;">$${(t.balance || 0).toLocaleString()}</div>
                    <div style="font-size:9px;color:#888;">Balansas</div>
                  </div>
                </div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;">
                  <div style="background:#f9f7f3;border:1px solid #e0d9cc;border-radius:7px;padding:8px;text-align:center;">
                    <div style="font-size:14px;font-weight:700;color:#2f4a75;">${totalSubmitted}</div>
                    <div style="font-size:9px;color:#888;margin-top:2px;">Pateiktos dienos</div>
                  </div>
                  <div style="background:#f9f7f3;border:1px solid #e0d9cc;border-radius:7px;padding:8px;text-align:center;">
                    <div style="font-size:14px;font-weight:700;color:#2f4a75;">${totalMWh} MWh</div>
                    <div style="font-size:9px;color:#888;margin-top:2px;">Pirkta iš viso</div>
                  </div>
                  <div style="background:#f9f7f3;border:1px solid #e0d9cc;border-radius:7px;padding:8px;text-align:center;">
                    <div style="font-size:14px;font-weight:700;color:${pnl >= 0 ? '#27ae60' : '#e74c3c'};">${pnl >= 0 ? '+' : ''}$${Math.abs(pnl).toLocaleString()}</div>
                    <div style="font-size:9px;color:#888;margin-top:2px;">P&amp;L</div>
                  </div>
                </div>
                <div style="font-size:11px;font-weight:700;color:#2f4a75;margin-bottom:5px;">Pasirinkite dieną:</div>
                <div style="display:flex;gap:4px;overflow-x:auto;padding:2px 0;margin-bottom:10px;">
                  ${Array.from({ length: nr }, (_, i) => i + 1).map(r => `
                    <button id="pgvBtn_${r}" style="padding:4px 10px;border:1.5px solid ${r === cr ? '#2f4a75' : '#d4cec2'};border-radius:20px;background:${r === cr ? '#2f4a75' : 'white'};color:${r === cr ? 'white' : r < cr ? '#aaa' : '#888'};font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;"
                      onclick="pgvShow('${t.id}',${sessionId},${r})">
                      ${r < cr ? '🔒 ' : ''}D${r}
                    </button>`).join('')}
                </div>
                <div id="pgvChartWrap" style="background:white;border:1px solid #e8dfd4;border-radius:10px;padding:10px;margin-bottom:10px;">
                  <div style="font-size:11px;font-weight:700;color:#2f4a75;margin-bottom:6px;" id="pgvChartTitle">Diena ${cr} — 24 valandų vaizdas</div>
                  <div style="position:relative;height:180px;"><canvas id="pgvChart"></canvas></div>

        // ── CHART (24h, read-only, team bid overlays, clickable hours) ───

        async function getOrGenPrices(s, round) {

        const bidDirectionPlugin = {

            afterDatasetsDraw(chart) {

                chart.data.datasets.forEach((dataset, datasetIndex) => {

                    if (!netMW) return;
                    const meta = chart.getDatasetMeta(datasetIndex);
                    if (!meta || !meta.data) return;
                    if (meta.hidden) return;
                    if (!dataset.hidden) {
                        meta.data.forEach((point, index) => {
                            const netValue = netMW[index];
                            if (netValue === 0 || !netValue) return;
                            const x = point.x;
                            const y = point.y;
                            if (!x || !y) return;
                            ctx.save();
                            const maxLength = 40;
                            const minLength = 8;
                            const length = Math.min(Math.abs(netValue) * 1.5, maxLength);
                            const finalLength = Math.max(minLength, length);

                            ctx.beginPath();
                            ctx.lineWidth = 3;

                            // Buy upward, sell downward
                            if (netValue > 0) {
                                ctx.strokeStyle = '#27ae60';
                                ctx.moveTo(x, y);
                                ctx.lineTo(x, y - finalLength);
                            } else {
                                ctx.strokeStyle = '#e74c3c';
                                ctx.moveTo(x, y);
                                ctx.lineTo(x, y + finalLength);
                            }

                            ctx.stroke();
                            ctx.restore();

        function renderSupplyChart(canvas, supplyData, demand, demandPoints, round, hour) {

        function generateDemandCurve(maxQuantity, basePrice, round, hour) {
            const points = [];
            const numPoints = 6;
            for (let i = 0; i <= numPoints; i++) {
                const price = basePrice + (1 - (i / numPoints)) * 50;
                const quantity = maxQuantity * (0.2 + (i / numPoints) * 0.8);
                points.push({ x: Math.round(quantity), y: Math.round(price) });
            }
            const seed = round * hour;
            points.forEach(p => {
                p.x = Math.max(10, p.x + (seed % 20) - 10);
                p.y = Math.max(20, p.y + (seed % 15) - 7);
            });
            return points.sort((a, b) => a.x - b.x);
        }

        function generateSupplyStackForHour(round, hour) {
            let seed = round * 31 + hour * 7;
            const rng = () => {
                seed = (seed * 16807) % 2147483647;
                return (seed - 1) / 2147483646;
            };

            const groups = [
                { name: 'Vėjas', color: '#4A90E2', base: 200 },
                { name: 'Saulė', color: '#F5A623', base: 150 },
                { name: 'Dujos', color: '#7B8D8E', base: 175 },
                { name: 'Vanduo', color: '#2ECC71', base: 120 },
                { name: 'Kita', color: '#9B59B6', base: 165 }
            ];

            const dayMults = [
                [0.8, 0.9, 1.0, 1.1, 1.2],
                [0.7, 1.0, 1.1, 0.9, 1.3],
                [1.2, 0.8, 1.1, 0.9, 1.0],
                [1.1, 1.2, 0.7, 1.0, 0.9],
                [1.0, 1.1, 0.9, 1.2, 0.8]
            ];
            const mult = dayMults[(round - 1) % dayMults.length];

            const labels = [];
            const values = [];
            const colors = [];

            groups.forEach((g, gi) => {
                for (let i = 0; i < 6; i++) {
                    labels.push(`${g.name} ${i + 1}`);
                    const hourFactor = 0.7 + (hour / 24) * 0.6;
                    const value = Math.round(g.base * mult[gi] * hourFactor * (0.7 + rng() * 0.6));
                    values.push(Math.max(10, value));
                    colors.push(g.color);
                }
            });

            const combined = labels.map((label, idx) => ({ label, value: values[idx], color: colors[idx] }));
            combined.sort((a, b) => a.value - b.value);

            return {
                labels: combined.map(c => c.label),
                values: combined.map(c => c.value),
                colors: combined.map(c => c.color)
            };
        }

            const teamDatasets = s.teams.map((t, ti) => {
                const bidData = Array(24).fill(null);
                const submitted = (t.bids || []).find(b => b.round === round && b.submitted);
                if (submitted && t.bidRows && t.bidRows[round]) {
                    t.bidRows[round].forEach((row, i) => { if (row && row.price) bidData[i] = +row.price; });
                }
                const color = TEAM_COLORS[ti % TEAM_COLORS.length];
                return {
                    label: t.name, data: bidData, type: 'line', borderColor: color, backgroundColor: 'transparent',
                    pointBackgroundColor: color, pointRadius: 4, borderWidth: 2.5, tension: 0.2, spanGaps: false
                };
            }).filter(ds => ds.data.some(v => v !== null));

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Rinkos kaina', data: prices,
                            backgroundColor: 'rgba(100,160,255,.4)', borderColor: 'rgba(100,160,255,.7)',
                            borderWidth: 1, borderRadius: 3, type: 'bar', order: 10
                        },
                        ...teamDatasets
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'top', labels: { color: '#ccc', font: { size: 11 }, boxWidth: 14, padding: 10 } } },
                    scales: {
                        y: { beginAtZero: false, ticks: { color: '#aaa', font: { size: 10 }, callback: v => v + '$' }, grid: { color: 'rgba(255,255,255,.08)' } },
                        x: { ticks: { color: '#aaa', font: { size: 9 }, maxRotation: 45 }, grid: { display: false } }
                    },
                    animation: { duration: 500 }
                }
            });
        }
        // ── HELPERS ────────────────────────────────────
        function toggleHourBids(hourId) {
            const content = document.getElementById(hourId);
            const icon = document.getElementById(hourId + '_icon');

            if (content) {
                if (content.style.display === 'none' || content.style.display === '') {
                    content.style.display = 'block';
                    if (icon) icon.textContent = '▼';
                } else {
                    content.style.display = 'none';
                    if (icon) icon.textContent = '▶';
                }
            }
        }
        // Draw demand curve overlay on the supply chart
        let demandCurveDrawn = false;
        function drawDemandCurveOnSupplyChart(chart, demandPoints, clearingQuantity, clearingPrice, clearingIndex, values) {
            if (!chart || !chart.scales || !chart.scales.x || !chart.scales.y) return;

            const ctx = chart.ctx;
            const xScale = chart.scales.x;
            const yScale = chart.scales.y;

            ctx.save();

            // Draw the demand curve line (top-left to bottom-right)
            ctx.beginPath();
            ctx.strokeStyle = '#E74C3C';
            ctx.lineWidth = 3;
            ctx.setLineDash([]);

            let firstPoint = true;
            for (let i = 0; i < demandPoints.length; i++) {
                const x = xScale.getPixelForValue(demandPoints[i].x);
                const y = yScale.getPixelForValue(demandPoints[i].y);

                if (x >= chart.chartArea.left && x <= chart.chartArea.right &&
                    y >= chart.chartArea.top && y <= chart.chartArea.bottom) {
                    if (firstPoint) {
                        ctx.moveTo(x, y);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
            }
            ctx.stroke();

            // Draw clearing point markers if found
            if (clearingQuantity && clearingPrice && clearingIndex !== -1) {
                const clearingX = xScale.getPixelForValue(clearingQuantity);
                const clearingY = yScale.getPixelForValue(clearingPrice);

                // Vertical line from clearing point to x-axis
                ctx.beginPath();
                ctx.moveTo(clearingX, chart.chartArea.top);
                ctx.lineTo(clearingX, clearingY);
                ctx.strokeStyle = '#F39C12';
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 6]);
                ctx.stroke();

                // Horizontal line from clearing point to y-axis
                ctx.beginPath();
                ctx.moveTo(chart.chartArea.left, clearingY);
                ctx.lineTo(clearingX, clearingY);
                ctx.stroke();

                // Orange marker at clearing point
                ctx.beginPath();
                ctx.arc(clearingX, clearingY, 7, 0, 2 * Math.PI);
                ctx.fillStyle = '#F39C12';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 11px sans-serif';
                ctx.fillText('K', clearingX - 3, clearingY + 4);

                // Connect to the supply bar
                const barMeta = chart.getDatasetMeta(0);
                if (barMeta && barMeta.data[clearingIndex]) {
                    const barX = barMeta.data[clearingIndex].x;
                    ctx.beginPath();
                    ctx.moveTo(barX, clearingY);
                    ctx.lineTo(clearingX, clearingY);
                    ctx.strokeStyle = '#F39C12';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }
        // excess function
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function getCurrentBid(t, r) { return (t.bids || []).find(b => b.round === r) || null; }
        function calcBidStatus(s) { let sub = 0, dft = 0, non = 0; s.teams.forEach(t => { const b = getCurrentBid(t, s.currentRound); if (!b) non++; else if (b.submitted) sub++; else dft++; }); return { submitted: sub, draft: dft, none: non }; }
        function statusLabel(st) { return { waiting: 'Laukiama', active: 'Aktyvi', finished: 'Baigta' }[st] || st; }

        function closeModal(id) {
            const modal = document.getElementById(id);
            if (modal) modal.classList.remove('open');
            if (id === 'playerModal' && pgvChartInstance) {
                pgvChartInstance.destroy();
                pgvChartInstance = null;
            }
            if (window.projectorChartInstance) {
                try { window.projectorChartInstance.destroy(); } catch (e) { }
                window.projectorChartInstance = null;
            }
        }
        /*
        function closeModal(id) { document.getElementById(id).classList.remove('open'); if (id === 'playerModal' && pgvChartInstance) { pgvChartInstance.destroy(); pgvChartInstance = null; } }
        */
        function closeAllModals() {
            document.querySelectorAll('.modal-bd').forEach(m => m.classList.remove('open'));
            if (pgvChartInstance) {
                pgvChartInstance.destroy();
                pgvChartInstance = null;
            }
            if (hourSupplyChartInstance) {
                try {
                    hourSupplyChartInstance.destroy();
                } catch (e) { }
                hourSupplyChartInstance = null;
            }
        }
        function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2800); }
        function nav(path) { window.location.href = path; }
        function logout() { if (confirm('Atsijungti?')) { sessionStorage.removeItem('isAdmin'); window.location.href = '/pages/login.html'; } }
        // ── INIT ───────────────────────────────────────
        loadState();
        renderActiveSessions();
        renderPreviousSessions();
    </script>

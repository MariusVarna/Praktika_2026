<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Pavadinimas</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#f5f1e8 0%,#f0ebe0 100%);background-attachment:fixed;color:#333;display:flex;flex-direction:column;overflow:hidden;position:relative;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 50 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25 2L41.5 11V29L25 38L8.5 29V11Z' fill='none' stroke='%23d4cec2' stroke-width='0.5' opacity='0.5'/%3E%3C/svg%3E");background-size:50px 50px;pointer-events:none;z-index:0;}
    body>*{position:relative;z-index:1;}
    header{background:linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-shrink:0;z-index:50;}
    .header-left{display:flex;align-items:center;gap:10px;}
    .menu-btn{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:6px;border-radius:7px;transition:background .2s;line-height:1;}
    .menu-btn:hover{background:rgba(255,255,255,.1);}
    .logo{color:white;font-size:15px;font-weight:700;}
    .badge-admin{background:rgba(255,165,0,.3);color:#ffd78a;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid rgba(255,165,0,.4);}
    .header-right{display:flex;align-items:center;gap:6px;}
    .hbtn{background:rgba(255,255,255,.15);border:none;color:white;padding:5px 11px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:background .2s;white-space:nowrap;}
    .hbtn:hover{background:rgba(255,255,255,.25);}
    .sidebar{position:fixed;left:0;top:56px;width:240px;height:calc(100vh - 56px);background:white;border-right:1px solid #e0d9cc;z-index:100;transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:2px 0 8px rgba(0,0,0,.1);}
    .sidebar.active{transform:translateX(0);}
    .sb-head{padding:14px 18px;border-bottom:1px solid #e0d9cc;background:#fafaf8;}
    .sb-head h2{font-size:14px;font-weight:700;color:#2f4a75;}
    .sb-item{padding:12px 18px;cursor:pointer;transition:all .18s;color:#555;font-weight:500;font-size:13px;border-left:3px solid transparent;}
    .sb-item:hover{background:#f5f1e8;color:#2f4a75;border-left-color:#2f4a75;padding-left:22px;}
    .overlay{position:fixed;top:56px;left:0;width:100%;height:calc(100vh - 56px);background:rgba(0,0,0,0);z-index:99;opacity:0;pointer-events:none;transition:all .3s;}
    .overlay.active{background:rgba(0,0,0,.4);opacity:1;pointer-events:all;}
    .tab-bar{display:flex;background:white;border-bottom:2px solid #e0d9cc;flex-shrink:0;overflow-x:auto;z-index:10;}
    .tab-bar::-webkit-scrollbar{height:0;}
    .tbtn{padding:10px 16px;background:none;border:none;color:#888;font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;}
    .tbtn.active{color:#2f4a75;border-bottom-color:#2f4a75;}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    main{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;}
    .card{background:white;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);border:1px solid #e8dfd4;}
    .card h2{font-size:16px;font-weight:700;color:#2f4a75;margin-bottom:10px;}
    .card h3{font-size:13px;font-weight:700;color:#2f4a75;margin-bottom:8px;}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
    .fg.full{grid-template-columns:1fr;}
    label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:3px;}
    input[type=text],input[type=number],input[type=email],input[type=password],select{width:100%;padding:7px 10px;border:1.5px solid #d4cec2;border-radius:7px;background:#fafaf8;color:#333;font-size:12px;transition:all .18s;}
    input:focus,select:focus{outline:none;border-color:#2f4a75;background:white;box-shadow:0 0 0 2px rgba(47,74,117,.12);}
    .btn{padding:7px 13px;border:none;border-radius:7px;cursor:pointer;font-weight:600;font-size:12px;transition:all .18s;white-space:nowrap;}
    .btn-primary{background:linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);color:white;}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(47,74,117,.3);}
    .btn-danger{background:linear-gradient(135deg,#e74c3c 0%,#c0392b 100%);color:white;}
    .btn-danger:hover{transform:translateY(-1px);}
    .btn-success{background:linear-gradient(135deg,#27ae60 0%,#1e8449 100%);color:white;}
    .btn-success:hover{transform:translateY(-1px);}
    .btn-warn{background:linear-gradient(135deg,#e67e22 0%,#ca6f1e 100%);color:white;}
    .btn-warn:hover{transform:translateY(-1px);}
    .btn-sec{background:#e8dfd4;color:#555;}
    .btn-sec:hover{background:#ddd5c8;}
    .btn-xs{padding:4px 8px;font-size:11px;}
    .btn-sm{padding:6px 11px;font-size:12px;}
    .btn-full{width:100%;margin-top:8px;}
    .btn-grp{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
    /* round action buttons — larger for clarity */
    .btn-start-round{background:linear-gradient(135deg,#27ae60,#1e8449);color:white;padding:9px 18px;font-size:13px;font-weight:700;}
    .btn-end-round{background:linear-gradient(135deg,#e74c3c,#c0392b);color:white;padding:9px 18px;font-size:13px;font-weight:700;}
    .sc{border:1px solid #e0d9cc;border-radius:10px;padding:12px;background:#fafaf8;margin-bottom:8px;}
    .sc:last-child{margin-bottom:0;}
    .sc-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .sc-name{font-weight:700;color:#2f4a75;font-size:14px;}
    .sc-sub{font-size:10px;color:#999;margin-top:2px;}
    .pin-badge{font-family:'Courier New',monospace;font-size:18px;font-weight:700;color:#2f4a75;letter-spacing:5px;text-align:center;padding:8px;background:#e8f0fb;border-radius:7px;margin:6px 0;}
    .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;}
    .dot-waiting{background:#f39c12;}.dot-active{background:#27ae60;}.dot-finished{background:#999;}
    .sr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0ebe0;font-size:12px;}
    .sr:last-child{border-bottom:none;}
    .sl{color:#777;}.sv{color:#2f4a75;font-weight:600;}
    /* Two-column layout for manage panels */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(max-width:680px){.two-col{grid-template-columns:1fr;}}
    /* Round control block */
    .rc{background:linear-gradient(135deg,#eaf2ff,#ddeeff);border:1px solid #b8d4f8;border-radius:10px;padding:12px;margin-bottom:10px;}
    .rc h3{color:#1f3a55;margin-bottom:8px;font-size:13px;}
    .rc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
    @media(max-width:480px){.rc-stats{grid-template-columns:repeat(2,1fr);}}
    .rc-stat{background:white;border-radius:7px;padding:7px;text-align:center;border:1px solid #d4e8ff;}
    .rc-stat .v{font-size:18px;font-weight:700;color:#2f4a75;}
    .rc-stat .l{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.3px;}
    .bets-pill{border-radius:7px;padding:6px 10px;font-size:11px;font-weight:700;margin-bottom:8px;display:inline-block;}
    .bets-open-p{background:#e8f8f0;color:#1e8449;border:1px solid #a9dfbf;}
    .bets-closed-p{background:#fef9e7;color:#d68910;border:1px solid #f9e79f;}
    /* scrollable panels */
    .scroll-panel{max-height:210px;overflow-y:scroll;margin-top:4px;}
    .scroll-panel::-webkit-scrollbar{width:4px;}
    .scroll-panel::-webkit-scrollbar-thumb{background:#d4cec2;border-radius:3px;}
    /* compact user pill */
    .up{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#fafaf8;border:1px solid #e8dfd4;border-radius:7px;margin-bottom:4px;cursor:pointer;transition:background .15s;}
    .up:last-child{margin-bottom:0;}
    .up:hover{background:#f0ebe0;}
    .ua{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#2f4a75,#1f3a55);display:flex;align-items:center;justify-content:center;color:white;font-size:9px;font-weight:700;flex-shrink:0;}
    .un{font-size:12px;font-weight:600;color:#333;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .ub{font-size:11px;font-weight:700;color:#27ae60;}
    .online-dot{width:5px;height:5px;border-radius:50%;background:#27ae60;flex-shrink:0;}
    /* bid status rows */
    .bid-summary{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
    .bid-chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
    .bc-sub{background:#e8f8f0;color:#1e8449;border:1px solid #a9dfbf;}
    .bc-dft{background:#fef9e7;color:#d68910;border:1px solid #f9e79f;}
    .bc-non{background:#f5f1e8;color:#999;border:1px solid #e0d9cc;}
    .bs-row{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#fafaf8;border:1px solid #e8dfd4;border-radius:7px;margin-bottom:4px;font-size:11px;}
    .bs-row:last-child{margin-bottom:0;}
    .bs-name{flex:1;font-weight:600;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .bs-detail{color:#888;font-size:10px;flex-shrink:0;}
    /* compact transactions */
    .tx-row{display:flex;align-items:center;gap:6px;padding:5px 6px;border-bottom:1px solid #f5f1e8;font-size:11px;}
    .tx-row:last-child{border-bottom:none;}
    .tx-buy{color:#27ae60;font-weight:700;}.tx-sell{color:#e74c3c;font-weight:700;}
    .tx-info{flex:1;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .tx-meta{color:#bbb;flex-shrink:0;}
    /* tables */
    table{width:100%;border-collapse:collapse;}
    thead{background:#f5f1e8;}
    th{padding:7px 8px;text-align:left;font-size:10px;font-weight:700;color:#2f4a75;text-transform:uppercase;letter-spacing:.3px;}
    td{padding:7px 8px;border-bottom:1px solid #f0ebe0;font-size:11px;color:#555;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:#fafaf8;}
    .chart-wrap{position:relative;height:220px;margin-top:8px;}
    .chart-card-wide{background:white;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);border:1px solid #e8dfd4;margin-bottom:12px;}
    .chart-card-wide h3{font-size:13px;font-weight:700;color:#2f4a75;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
    /* modals */
    .modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
    .modal-bd.open{display:flex;}
    .modal{background:white;border-radius:14px;width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:auto;}
    .modal-hd{padding:13px 16px;border-bottom:1px solid #e0d9cc;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:white;z-index:1;border-radius:14px 14px 0 0;}
    .modal-hd h2{font-size:14px;font-weight:700;color:#2f4a75;}
    .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999;line-height:1;padding:2px;}
    .modal-body{padding:14px 16px;max-height:82vh;overflow-y:auto;}
    /* player game view */
    .pgv-rounds{display:flex;gap:4px;overflow-x:auto;padding:2px 0;margin-bottom:10px;}
    .pgv-rounds::-webkit-scrollbar{height:0;}
    .pgv-rbtn{padding:4px 10px;border:1.5px solid #d4cec2;border-radius:20px;background:white;font-size:11px;font-weight:600;color:#888;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
    .pgv-rbtn.active{background:#2f4a75;color:white;border-color:#2f4a75;}
    .pgv-rbtn.past{color:#bbb;}
    .pgv-energy{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
    .pgv-ebox{background:#f9f7f3;border:1px solid #e0d9cc;border-radius:7px;padding:8px;text-align:center;}
    .pgv-ebox .v{font-size:13px;font-weight:700;color:#2f4a75;}
    .pgv-ebox .l{font-size:9px;color:#888;margin-top:2px;}
    /* projector screen */
    .proj-screen{background:#1a1a2e;border-radius:12px;padding:18px;color:white;margin-bottom:10px;}
    .proj-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:3px;color:#a8d8ff;}
    .proj-sub{font-size:11px;text-align:center;color:#888;margin-bottom:14px;}
    .proj-table{width:100%;border-collapse:collapse;}
    .proj-table th{padding:7px 9px;font-size:10px;font-weight:700;color:#999;text-align:left;border-bottom:1px solid rgba(255,255,255,.12);text-transform:uppercase;}
    .proj-table td{padding:7px 9px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.06);}
    .proj-table tr:last-child td{border-bottom:none;}
    .proj-market{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1);}
    .proj-mstat{text-align:center;}
    .proj-mstat .v{font-size:16px;font-weight:700;color:#a8d8ff;}
    .proj-mstat .l{font-size:9px;color:#888;margin-top:2px;}
    .proj-rd{margin-top:12px;}
    .proj-rd h3{font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
    .proj-rd table th{padding:5px 7px;font-size:9px;}
    .proj-rd table td{padding:5px 7px;font-size:11px;}
    .c-pos{color:#7effc0;font-weight:700;}.c-neg{color:#ff8080;font-weight:700;}.c-blue{color:#a8d8ff;font-weight:700;}.c-white{color:white;font-weight:600;}
    /* toast */
    .toast{position:fixed;bottom:14px;right:14px;background:#2f4a75;color:white;padding:8px 13px;border-radius:8px;font-size:12px;font-weight:600;z-index:500;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-thumb{background:#d4cec2;border-radius:3px;}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="menu-btn" id="menuBtn">☰</button>
    <span class="logo">Pavadinimas</span>
    <span class="badge-admin">ADMIN</span>
  </div>
  <div class="header-right">
    <button class="hbtn" onclick="logout()">Atsijungti</button>
  </div>
</header>

<div class="sidebar" id="sidebar">
  <div class="sb-head"><h2>Navigacija</h2></div>
  <div class="sb-item" onclick="nav('/pages/admin.html')">Administravimas</div>
  <div class="sb-item" onclick="nav('/pages/join.html')">Prisijungimas</div>
  <div class="sb-item" onclick="nav('/pages/help.html')">Žinynas</div>
  <div class="sb-item" onclick="nav('/pages/settings.html')">⚙Parinktys</div>
</div>
<div class="overlay" id="overlay"></div>

<div class="tab-bar">
  <button class="tbtn active" onclick="switchTab('create',this)">➕ Nauja</button>
  <button class="tbtn" onclick="switchTab('active',this)">▶ Aktyvios</button>
  <button class="tbtn" id="manageTabBtn" onclick="switchTab('manage',this)" style="display:none">Valdymas</button>
  <button class="tbtn" onclick="switchTab('previous',this)">Ankstesnės</button>
</div>

<main>
  <!-- CREATE -->
  <div id="create" class="tab-content active">
    <div class="card">
      <h2>Sukurti naują sesiją</h2>
      <div class="fg full"><div><label>Žaidimo pavadinimas</label><input type="text" id="gameName" placeholder="pvz. Elektros rinka 2026"></div></div>
      <div class="fg">
        <div><label>Pradžios diena</label><input type="number" id="startDay" value="1" min="1"></div>
        <div><label>Raundų skaičius</label><input type="number" id="numRounds" value="5" min="1" max="20"></div>
      </div>
      <div class="fg">
        <div><label>Maks. galia (MW)</label><input type="number" id="maxPower" value="100" min="1"></div>
        <div><label>Pralaidumas (MW)</label><input type="number" id="bandwidth" value="50" min="1"></div>
      </div>
      <div class="fg">
        <div><label>Efektyvumas (%)</label><input type="number" id="efficiency" value="85" min="1" max="100"></div>
        <div><label>Bauda ($/MWh)</label><input type="number" id="penaltyPrice" value="150" min="1"></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="createSession()">Sukurti sesiją</button>
    </div>
  </div>

  <!-- ACTIVE LIST -->
  <div id="active" class="tab-content"><div id="activeList"></div></div>

  <!-- MANAGE -->
  <div id="manage" class="tab-content"><div id="manageContent"></div></div>

  <!-- PREVIOUS -->
  <div id="previous" class="tab-content"><div id="previousList"></div></div>
</main>

<!-- PROJECTOR MODAL -->
<div class="modal-bd" id="projectorModal">
  <div class="modal" style="max-width:660px;">
    <div class="modal-hd">
      <h2>📺 Tarpiniai rezultatai — projektorius</h2>
      <button class="modal-close" onclick="closeModal('projectorModal')">×</button>
    </div>
    <div class="modal-body" id="projectorBody"></div>
  </div>
</div>

<!-- PLAYER GAME VIEW MODAL -->
<div class="modal-bd" id="playerModal">
  <div class="modal">
    <div class="modal-hd">
      <h2 id="playerModalTitle">Žaidėjo ekranas</h2>
      <button class="modal-close" onclick="closeModal('playerModal')">×</button>
    </div>
    <div class="modal-body" id="playerModalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────
let sessions=[], prevSessions=[], activeSessionId=null;
function saveState(){sessionStorage.setItem('adminSessions',JSON.stringify(sessions));sessionStorage.setItem('adminPrevSessions',JSON.stringify(prevSessions));}
function loadState(){try{sessions=JSON.parse(sessionStorage.getItem('adminSessions'))||[];}catch{sessions=[];}try{prevSessions=JSON.parse(sessionStorage.getItem('adminPrevSessions'))||[];}catch{prevSessions=[];}}

// ── SIDEBAR ────────────────────────────────────
const menuBtn=document.getElementById('menuBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('overlay');
menuBtn.addEventListener('click',e=>{e.stopPropagation();sidebar.classList.toggle('active');overlay.classList.toggle('active');});
overlay.addEventListener('click',()=>closeSidebar());
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeSidebar();closeAllModals();}});
document.querySelectorAll('.sb-item').forEach(i=>i.addEventListener('click',closeSidebar));
function closeSidebar(){sidebar.classList.remove('active');overlay.classList.remove('active');}

// ── TABS ───────────────────────────────────────
function switchTab(name,el){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(el)el.classList.add('active');
}

// ── CREATE SESSION ─────────────────────────────
function createSession(){
  const gn=document.getElementById('gameName').value.trim();
  if(!gn){toast('Įveskite žaidimo pavadinimą');return;}
  const pin=String(Math.floor(100000+Math.random()*900000));
  const sd=+document.getElementById('startDay').value||1;
  const s={id:Date.now(),pin,gameName:gn,status:'waiting',startDay:sd,numRounds:+document.getElementById('numRounds').value||5,
    currentRound:0,currentDay:sd,roundStarted:false,betsOpen:false,
    maxPower:+document.getElementById('maxPower').value||100,bandwidth:+document.getElementById('bandwidth').value||50,
    efficiency:+document.getElementById('efficiency').value||85,penaltyPrice:+document.getElementById('penaltyPrice').value||150,
    marketPrice:70,demand:500,weather:'Giedra',createdAt:new Date().toLocaleString(),completedAt:null,
    teams:[],transactions:[],roundHistory:[],customChart:null};
  sessions.push(s);saveState();
  document.getElementById('gameName').value='';
  toast('Sesija sukurta! PIN: '+pin);
  switchTab('active',document.querySelectorAll('.tbtn')[1]);renderActiveSessions();
}

// ── ACTIVE LIST ────────────────────────────────
function renderActiveSessions(){
  const el=document.getElementById('activeList');
  if(!sessions.length){el.innerHTML='<div class="card" style="text-align:center;color:#999;padding:24px;">Nėra aktyvių sesijų</div>';return;}
  el.innerHTML=sessions.map(s=>`
    <div class="sc">
      <div class="sc-hd"><div><div class="sc-name">${s.gameName}</div><div class="sc-sub"><span class="dot dot-${s.status}"></span>${statusLabel(s.status)} · ${s.createdAt}</div></div><div style="font-size:11px;color:#888;">R${s.currentRound}/${s.numRounds}</div></div>
      <div class="pin-badge">${s.pin}</div>

// ── ROUND ACTIONS ──────────────────────────────
function startRound(id){
  const s=sessions.find(x=>x.id===id);if(!s)return;
  if(s.currentRound>=s.numRounds){toast('Visi raundai baigti!');return;}
  s.roundStarted=true;s.betsOpen=false;
  saveState();toast(`▶ Raundas ${s.currentRound} pradėtas`);renderManage();
}
function endRound(id){
  const s=sessions.find(x=>x.id===id);if(!s)return;
  const finishedRound=s.currentRound;
  s.roundHistory.push({round:finishedRound,day:s.currentDay,marketPrice:s.marketPrice,demand:s.demand,weather:s.weather});
  s.betsOpen=false;s.roundStarted=false;s.currentRound++;s.currentDay=s.startDay+s.currentRound-1;
  s.teams.forEach(t=>{const d=Math.floor(Math.random()*6000-1000);t.balance=(t.balance||0)+d;t.roundHistory=t.roundHistory||[];t.roundHistory.push({round:finishedRound,balance:t.balance,profit:d});});
  saveState();toast(`Raundas ${finishedRound} baigtas`);renderManage();
  // Auto-open projector with the chart after round ends
  setTimeout(()=>openProjector(id),400);
}
function openBets(id){const s=sessions.find(x=>x.id===id);if(!s)return;s.betsOpen=true;saveState();toast('Statymai atidaryti');renderManage();}
function closeBets(id){const s=sessions.find(x=>x.id===id);if(!s)return;s.betsOpen=false;saveState();toast('Statymao uždaryti');renderManage();}
function addExtraRound(id){const s=sessions.find(x=>x.id===id);if(!s)return;s.numRounds++;saveState();toast('Iš viso raundų: '+s.numRounds);renderManage();}
function saveMarketParams(id){const s=sessions.find(x=>x.id===id);if(!s)return;s.marketPrice=+document.getElementById('mp_price').value||s.marketPrice;s.demand=+document.getElementById('mp_demand').value||s.demand;s.weather=document.getElementById('mp_weather').value;saveState();toast('💾 Rinkos parametrai išsaugoti');}
function startSession(id){const s=sessions.find(x=>x.id===id);if(!s)return;s.status='active';s.currentRound=1;s.currentDay=s.startDay;s.roundStarted=false;saveState();toast('▶ Sesija pradėta!');openManage(id);}
function finishSession(id){if(!confirm('Ar tikrai baigti sesiją?'))return;const s=sessions.find(x=>x.id===id);if(!s)return;s.status='finished';s.completedAt=new Date().toLocaleString();prevSessions.push(s);sessions=sessions.filter(x=>x.id!==id);saveState();toast('Sesija baigta');document.getElementById('manageTabBtn').style.display='none';switchTab('previous',document.querySelectorAll('.tbtn')[3]);renderPreviousSessions();}
function archiveSession(id){if(!confirm('Archyvuoti?'))return;const s=sessions.find(x=>x.id===id);if(!s)return;s.status='finished';s.completedAt=new Date().toLocaleString();prevSessions.push(s);sessions=sessions.filter(x=>x.id!==id);saveState();toast('Archyvuota');renderActiveSessions();renderPreviousSessions();}

// ── DEMO TEAM ──────────────────────────────────
function addDemoTeam(id){
  const s=sessions.find(x=>x.id===id);if(!s)return;
  const n=s.teams.length+1,tid='team_'+Date.now();
  const demoBids=[];
  const demoBidRows={};
  // Generate 24-row bidRows for each past round and current round
  for(let r=1;r<=Math.max(s.currentRound,1);r++){
    const basePrice=Math.floor(55+Math.random()*30);
    const rows=Array.from({length:24},(_,h)=>({
      price: +(basePrice + (Math.random()*10-5)).toFixed(1),
      mw: Math.floor(5+Math.random()*40),
      type: Math.random()>0.35?'buy':'sell'
    }));
    demoBidRows[r]=rows;
    demoBids.push({round:r,price:basePrice,mw:rows[0].mw,type:'buy',submitted:r<=s.currentRound});
  }
  s.teams.push({id:tid,name:'Komanda '+n,password:'pw'+n+Math.floor(Math.random()*900+100),balance:10000+Math.floor(Math.random()*5000),bids:demoBids,roundHistory:[],bidRows:demoBidRows});
  if(s.currentRound>0)s.transactions.push({day:s.currentDay,round:s.currentRound,teamName:'Komanda '+n,teamId:tid,type:'buy',mw:Math.floor(20+Math.random()*40),price:Math.floor(60+Math.random()*30)});
  saveState();renderManage();
}

  const pnl = Math.round(bids.filter(b=>b.submitted&&b.type==='buy').reduce((sum,b)=>sum+b.mw*(s.marketPrice-b.price),0));

      </div>
      <div style="text-align:right;">
        <div style="font-size:18px;font-weight:700;color:#2f4a75;">$${(t.balance||0).toLocaleString()}</div>
        <div style="font-size:9px;color:#888;">Balansas</div>
      </div>
    </div>

    <!-- Quick stats -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;">
      <div style="background:#f9f7f3;border:1px solid #e0d9cc;border-radius:7px;padding:8px;text-align:center;">
        <div style="font-size:14px;font-weight:700;color:#2f4a75;">${totalSubmitted}</div>
        <div style="font-size:9px;color:#888;margin-top:2px;">Pateiktos dienos</div>
      </div>
      <div style="background:#f9f7f3;border:1px solid #e0d9cc;border-radius:7px;padding:8px;text-align:center;">
        <div style="font-size:14px;font-weight:700;color:#2f4a75;">${totalMWh} MWh</div>
        <div style="font-size:9px;color:#888;margin-top:2px;">Pirkta iš viso</div>
      </div>
      <div style="background:#f9f7f3;border:1px solid #e0d9cc;border-radius:7px;padding:8px;text-align:center;">
        <div style="font-size:14px;font-weight:700;color:${pnl>=0?'#27ae60':'#e74c3c'};">${pnl>=0?'+':''}$${Math.abs(pnl).toLocaleString()}</div>
        <div style="font-size:9px;color:#888;margin-top:2px;">P&amp;L</div>

    <div style="display:flex;gap:4px;overflow-x:auto;padding:2px 0;margin-bottom:10px;">
      ${Array.from({length:nr},(_,i)=>i+1).map(r=>`
        <button id="pgvBtn_${r}" style="padding:4px 10px;border:1.5px solid ${r===cr?'#2f4a75':'#d4cec2'};border-radius:20px;background:${r===cr?'#2f4a75':'white'};color:${r===cr?'white':r<cr?'#aaa':'#888'};font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;"
          onclick="pgvShow('${t.id}',${sessionId},${r})">
          ${r<cr?'🔒 ':''}D${r}
        </button>`).join('')}

    <!-- Chart for selected day -->
    <div id="pgvChartWrap" style="background:white;border:1px solid #e8dfd4;border-radius:10px;padding:10px;margin-bottom:10px;">

let pgvChartInstance = null;

function pgvShow(teamId, sessionId, round) {
  const s = sessions.find(x => x.id === sessionId); if (!s) return;
  const t = s.teams.find(x => x.id === teamId); if (!t) return;
  const NUM_HOURS = 24;

  // Update button highlights
  document.querySelectorAll('[id^="pgvBtn_"]').forEach(b => {
    const r = +b.id.replace('pgvBtn_','');
    const isCr = r === s.currentRound;
    b.style.background = r === round ? '#f39c12' : (isCr ? '#2f4a75' : 'white');
    b.style.color = r === round || isCr ? 'white' : (r < s.currentRound ? '#aaa' : '#888');
    b.style.borderColor = r === round ? '#f39c12' : (isCr ? '#2f4a75' : '#d4cec2');
  });

  const rh = (s.roundHistory||[]).find(h=>h.round===round);
  const mp = rh ? rh.marketPrice : s.marketPrice;
  const demand = rh ? rh.demand : s.demand;
  const weather = rh ? rh.weather : s.weather;
  const isPast = round < s.currentRound;

  // Ensure hourly prices
  if (!s.marketPrices) s.marketPrices = {};
  if (!s.marketPrices[round]) {
    s.marketPrices[round] = Array.from({length:NUM_HOURS},(_,h)=>{
      const curve=[0.82,0.78,0.76,0.75,0.77,0.85,0.95,1.08,1.12,1.10,1.06,1.04,1.02,1.00,0.99,1.01,1.05,1.13,1.18,1.14,1.08,1.00,0.93,0.87];
      return +(mp*curve[h]*(0.92+Math.random()*0.16)).toFixed(2);
    });
  }
  const hourlyPrices = s.marketPrices[round];

  const bid = (t.bids||[]).find(b=>b.round===round);
  let rows = (t.bidRows&&t.bidRows[round]);
  if (!rows||!rows.length) {
    rows = Array.from({length:NUM_HOURS},(_,i)=>{
      if(i===0&&bid)return{price:bid.price,mw:bid.mw,type:bid.type};
      return{price:0,mw:0,type:'buy'};
    });
  }

  // Update chart title
  const chartTitle = document.getElementById('pgvChartTitle');
  if (chartTitle) chartTitle.textContent = `Diena ${round} — ${mp} $/MWh avg · ${demand} MW · ${weather}${isPast?' (baigta)':' (aktyvi)'}`;

  // Render chart
  const ctx = document.getElementById('pgvChart');
  if (ctx) {
    if (pgvChartInstance) { pgvChartInstance.destroy(); pgvChartInstance = null; }
    const labels = Array.from({length:NUM_HOURS},(_,h)=>String(h).padStart(2,'0')+':00');
    const bidLine = rows.map(r=>r&&r.price?+r.price:null);
    pgvChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label:'Rinkos kaina', data:hourlyPrices, backgroundColor:'rgba(47,74,117,.35)', borderColor:'#2f4a75', borderWidth:1, borderRadius:2, type:'bar', order:5 },
          { label:'Pasiūlymai', data:bidLine, type:'line', borderColor:'#f39c12', backgroundColor:'rgba(243,156,18,.08)', pointBackgroundColor:'#f39c12', pointRadius:2, borderWidth:2, tension:0.2, spanGaps:false, order:2 }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ title: items => labels[items[0].dataIndex] } } },
        scales:{
          y:{beginAtZero:false,ticks:{font:{size:9},callback:v=>v+'$'},grid:{color:'#f0ebe0'}},
          x:{ticks:{font:{size:8},maxRotation:45},grid:{display:false}}
        },
        animation:{duration:200}
      }
    });
  }

  // Bid list
  const bidStatus = bid?.submitted
    ? `<span style="font-size:10px;background:#e8f8f0;color:#1e8449;padding:2px 7px;border-radius:12px;">Pateikta</span>`
    : bid ? `<span style="font-size:10px;background:#fef9e7;color:#d68910;padding:2px 7px;border-radius:12px;">Juodraštis</span>`
    : `<span style="font-size:10px;background:#f5f1e8;color:#999;padding:2px 7px;border-radius:12px;">Tuščia</span>`;

  const bidListEl = document.getElementById('pgvBidList');
  if (bidListEl) bidListEl.innerHTML = `
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">${bidStatus}
      <span style="font-size:10px;background:#e8f0fb;color:#2f4a75;padding:2px 7px;border-radius:12px;">D${round}${isPast?' (baigta)':' (aktyvi)'}</span>
    </div>
    <div style="border:1px solid #e8dfd4;border-radius:8px;overflow:hidden;">
      <div style="display:grid;grid-template-columns:40px 1fr 1fr 64px;background:#f5f1e8;padding:4px 8px;font-size:10px;font-weight:700;color:#2f4a75;text-transform:uppercase;letter-spacing:.3px;border-bottom:1.5px solid #e0d9cc;">
        <span>Val.</span><span>Kaina $/MWh</span><span>Galia MW</span><span>Tipas</span>
      </div>
      <div style="max-height:220px;overflow-y:auto;">
        ${rows.map((r,i)=>`
          <div style="display:grid;grid-template-columns:40px 1fr 1fr 64px;align-items:center;padding:3px 8px;border-bottom:1px solid #f5f1e8;font-size:11px;background:${r&&r.price?'#fffdf0':'white'};">
            <span style="color:#aaa;font-size:10px;font-family:monospace;">${String(i).padStart(2,'0')}:00</span>
            <span style="color:${r&&r.price?'#2f4a75':'#ccc'};font-weight:${r&&r.price?'600':'400'}">${r&&r.price?r.price+' $':'—'}</span>
            <span style="color:#555;">${r&&r.mw?r.mw+' MW':'—'}</span>
            <span style="color:${r&&r.type==='buy'?'#27ae60':'#e74c3c'};font-size:10px;font-weight:600;">${r&&r.price?(r.type==='buy'?'pirk.':'pard.'):'—'}</span>
          </div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:40px 1fr 1fr 64px;padding:4px 8px;background:#f0f7ff;border-top:2px solid #b8d4f8;font-size:11px;font-weight:700;color:#2f4a75;">
        <span></span><span>Iš viso</span><span>${rows.reduce((s,r)=>s+(+r?.mw||0),0)} MW</span><span></span>
      </div>
    </div>
  `;

  // Round history
  const histEl = document.getElementById('pgvRoundHistory');
  if (histEl && (t.roundHistory||[]).length) {
    histEl.innerHTML = `<div style="margin-top:10px;font-size:11px;font-weight:700;color:#2f4a75;margin-bottom:5px;">Dienų istorija</div>
      <table style="width:100%;border-collapse:collapse;">
        <thead style="background:#f5f1e8;"><tr><th style="padding:5px 8px;font-size:10px;text-align:left;color:#2f4a75;">D</th><th style="padding:5px 8px;font-size:10px;text-align:left;">Balansas</th><th style="padding:5px 8px;font-size:10px;text-align:left;">Pelnas</th></tr></thead>
        <tbody>${t.roundHistory.map(r=>`<tr>
          <td style="padding:5px 8px;font-size:11px;color:#555;">D${r.round}</td>
          <td style="padding:5px 8px;font-size:11px;font-weight:600;color:#2f4a75;">$${(r.balance||0).toLocaleString()}</td>
          <td style="padding:5px 8px;font-size:11px;font-weight:600;color:${(r.profit||0)>=0?'#27ae60':'#e74c3c'}">${(r.profit||0)>=0?'+':''}$${Math.abs(r.profit||0).toLocaleString()}</td>
        </tr>`).join('')}</tbody>
      </table>`;
  } else if (histEl) histEl.innerHTML = '';
}

// ── PROJECTOR ──────────────────────────────────
function openProjector(sessionId) {
  const s = sessionId
    ? (sessions.find(x=>x.id===sessionId)||sessions[0])
    : (activeSessionId ? sessions.find(x=>x.id===activeSessionId) : null)
      || sessions.find(x=>x.status==='active')
      || sessions[0];

  let html = '';
  if (!s) {
    html = '<p style="color:#888;text-align:center;padding:32px;">Nėra aktyvių sesijų.</p>';
  } else {
    const sorted = [...s.teams].sort((a,b)=>(b.balance||0)-(a.balance||0));
    const lastRound = Math.max(s.currentRound-1,0);
    html = `
      <div class="proj-screen" style="padding:20px;">
        <div class="proj-title">${s.gameName}</div>
        <div class="proj-sub">Diena ${lastRound||s.currentRound} / ${s.numRounds} &nbsp;·&nbsp; PIN: ${s.pin}</div>
        <div style="position:relative;height:300px;margin:14px 0 8px;"><canvas id="projChart"></canvas></div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px;">
          ${s.teams.map((t,i)=>`<span style="font-size:11px;color:#ddd;display:flex;align-items:center;gap:4px;">
            <span style="display:inline-block;width:14px;height:3px;background:${TEAM_COLORS[i%TEAM_COLORS.length]};border-radius:2px;"></span>${t.name}
          </span>`).join('')}
        </div>
        <div class="proj-rd">
          <h3 style="color:#999;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Einamosios pozicijos</h3>
          <table class="proj-table">
            <thead><tr><th>#</th><th>Komanda</th><th>Balansas</th><th>D${lastRound||s.currentRound} pokytis</th></tr></thead>
            <tbody>${sorted.length ? sorted.map((t,i)=>{
              const lrh = (t.roundHistory||[]).find(r=>r.round===lastRound);
              const chg = lrh ? lrh.profit : 0;
              return `<tr>
                <td style="color:${TEAM_COLORS[s.teams.indexOf(t)%TEAM_COLORS.length]};font-weight:700;">${i+1}</td>
                <td class="c-white">${t.name}</td>
                <td class="c-pos">$${(t.balance||0).toLocaleString()}</td>
                <td class="${chg>=0?'c-pos':'c-neg'}">${chg>=0?'+':''}$${Math.abs(chg||0).toLocaleString()}</td>
              </tr>`;
            }).join('') : '<tr><td colspan="4" style="color:#666;text-align:center;padding:10px;">Nėra komandų</td></tr>'}
            </tbody>
          </table>
        </div>
        <div class="proj-market" style="margin-top:10px;">
          <div class="proj-mstat"><div class="v">${s.marketPrice} $/MWh</div><div class="l">Vid. kaina</div></div>
          <div class="proj-mstat"><div class="v">${s.demand} MW</div><div class="l">Paklausa</div></div>
          <div class="proj-mstat"><div class="v">${s.weather}</div><div class="l">Oras</div></div>
          <div class="proj-mstat"><div class="v">${sorted.length}</div><div class="l">Komandos</div></div>
        </div>
      </div>`;
  }

  document.getElementById('projectorBody').innerHTML = html;
  document.getElementById('projectorModal').classList.add('open');
  if (s) setTimeout(() => renderChartInto('projChart', s), 80);
}

// ── PREVIOUS ───────────────────────────────────
function renderPreviousSessions(){
  const el=document.getElementById('previousList');
  if(!prevSessions.length){el.innerHTML='<div class="card" style="text-align:center;color:#999;padding:24px;">Nėra archyvuotų sesijų</div>';return;}
  el.innerHTML=prevSessions.map(s=>`
    <div class="sc">
      <div class="sc-hd"><div><div class="sc-name">${s.gameName}</div><div class="sc-sub">Baigta: ${s.completedAt||'—'}</div></div><div style="font-size:11px;color:#888;">${s.numRounds} dienų</div></div>
      <div class="pin-badge" style="background:#f5f1e8;color:#888;">${s.pin}</div>
      <div class="sr"><span class="sl">Komandos</span><span class="sv">${s.teams.length}</span></div>
      <div class="btn-grp">
        <button class="btn btn-sec btn-sm" onclick="viewArchived('${s.id}')">Peržiūrėti</button>
        <button class="btn btn-danger btn-sm" onclick="deleteArchived('${s.id}')">Ištrinti</button>
      </div>
    </div>`).join('');
}
function viewArchived(id){const s=prevSessions.find(x=>x.id==id);if(!s)return;if(!sessions.find(x=>x.id==id))sessions.push({...s});activeSessionId=s.id;document.getElementById('manageTabBtn').style.display='';switchTab('manage',document.getElementById('manageTabBtn'));renderManage();}
function deleteArchived(id){if(!confirm('Ištrinti visam laikui?'))return;prevSessions=prevSessions.filter(x=>x.id!=id);saveState();renderPreviousSessions();}

// ── CHART (24h, read-only, team bid overlays, clickable hours) ───
const TEAM_COLORS = [
  '#e74c3c','#27ae60','#9b59b6','#e67e22','#1abc9c',
  '#e91e63','#ff9800','#00bcd4','#8bc34a','#ff5722'
];
let adminChartInstance = null;

function getOrGenPrices(s, round) {
  if (!s.marketPrices) s.marketPrices = {};
  if (!s.marketPrices[round]) {
    const rh = (s.roundHistory||[]).find(r=>r.round===round);
    const base = rh ? rh.marketPrice : (s.marketPrice || 70);
    const curve = [0.82,0.78,0.76,0.75,0.77,0.85,0.95,1.08,1.12,1.10,1.06,1.04,1.02,1.00,0.99,1.01,1.05,1.13,1.18,1.14,1.08,1.00,0.93,0.87];
    s.marketPrices[round] = Array.from({length:24},(_,h)=>+(base*curve[h]*(0.92+Math.random()*0.16)).toFixed(2));
  }
  return s.marketPrices[round];
}

function renderAdminChart(s) {
  const ctx = document.getElementById('adminChart'); if (!ctx) return;
  if (adminChartInstance) { adminChartInstance.destroy(); adminChartInstance = null; }

  const round = s.currentRound || 1;
  const prices = getOrGenPrices(s, round);
  const labels = Array.from({length:24},(_,i)=>String(i).padStart(2,'0')+':00');

  // One line per team — submitted bids for current round
  const teamDatasets = s.teams.map((t, ti) => {
    const bidData = Array(24).fill(null);
    const submitted = (t.bids||[]).find(b=>b.round===round&&b.submitted);
    if (submitted && t.bidRows && t.bidRows[round]) {
      t.bidRows[round].forEach((row,i) => { if (row && row.price) bidData[i] = +row.price; });
    }
    const color = TEAM_COLORS[ti % TEAM_COLORS.length];
    return { label: t.name, data: bidData, type: 'line', borderColor: color, backgroundColor: 'transparent',
      pointBackgroundColor: color, pointRadius: 3, pointHoverRadius: 5, borderWidth: 2, tension: 0.2, spanGaps: false, order: ti+1 };
  }).filter(ds => ds.data.some(v => v !== null));

  adminChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Rinkos kaina', data: prices,
          backgroundColor: 'rgba(47,74,117,.35)', borderColor: '#2f4a75', borderWidth: 1, borderRadius: 3,
          type: 'bar', order: 20 },
        ...teamDatasets
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (evt, elements, chart) => {
        const pts = chart.getElementsAtEventForMode(evt, 'index', {intersect:false}, false);
        if (pts.length) openHourDetailModal(s, round, pts[0].index);
      },
      plugins: {
        legend: { display: true, position: 'top', labels: { font: { size: 10 }, boxWidth: 12, padding: 8 } },
        tooltip: {
          callbacks: {
            title: items => labels[items[0].dataIndex] + ' — Diena ' + round,
            afterBody: items => {
              const h = items[0].dataIndex;
              return s.teams.filter(t=>{
                const b = t.bidRows&&t.bidRows[round]&&t.bidRows[round][h];
                return b && b.price;
              }).map(t => {
                const r = t.bidRows[round][h];
                return `${t.name}: ${r.price} $/MWh · ${r.mw} MW (${r.type==='buy'?'pirk.':'pard.'})`;
              });
            }
          }
        }
      },
      scales: {
        y: { beginAtZero: false, ticks: { font: { size: 10 }, callback: v => v + '$' }, grid: { color: '#f0ebe0' } },
        x: { ticks: { font: { size: 9 }, maxRotation: 45 }, grid: { display: false } }
      },
      animation: { duration: 300 }
    }
  });
}

// ── HOUR DETAIL POPUP (admin clicking chart bar) ──
function openHourDetailModal(s, round, hour) {
  const label = String(hour).padStart(2,'0') + ':00–' + String(hour+1).padStart(2,'0') + ':00';
  const prices = s.marketPrices && s.marketPrices[round] ? s.marketPrices[round] : [];
  const mp = prices[hour] || s.marketPrice || '—';

  const rows = s.teams.map(t => {
    const r = (t.bidRows&&t.bidRows[round]) ? t.bidRows[round][hour] : null;
    const submitted = (t.bids||[]).some(b=>b.round===round&&b.submitted);
    return { name: t.name, row: r, submitted };
  });

  // Show in a simple alert-style overlay within the player modal
  const html = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;" onclick="this.remove()">
      <div style="background:white;border-radius:14px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);" onclick="event.stopPropagation()">
        <div style="padding:13px 16px;border-bottom:1px solid #e0d9cc;display:flex;justify-content:space-between;align-items:center;">
          <div style="font-weight:700;font-size:14px;color:#2f4a75;">Diena ${round} · ${label}</div>
          <button onclick="this.closest('[onclick]').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999;">×</button>
        </div>
        <div style="padding:14px 16px;max-height:60vh;overflow-y:auto;">
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ebe0;margin-bottom:10px;">
            <span style="color:#777;font-size:12px;">Rinkos kaina</span>
            <span style="font-weight:700;font-size:14px;color:#2f4a75;">${typeof mp==='number'?mp.toFixed(2):mp} $/MWh</span>
          </div>
          <div style="font-size:11px;font-weight:700;color:#2f4a75;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;">Komandų pasiūlymai</div>
          ${rows.length ? rows.map((row, ri) => `
            <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#fafaf8;border-radius:7px;margin-bottom:4px;border:1px solid #e8dfd4;">
              <span style="width:10px;height:10px;border-radius:50%;background:${TEAM_COLORS[ri%TEAM_COLORS.length]};flex-shrink:0;"></span>
              <span style="flex:1;font-size:12px;font-weight:600;">${row.name}</span>
              ${row.row && row.row.price ? `
                <span style="font-size:12px;color:#2f4a75;font-weight:600;">${row.row.price} $/MWh</span>
                <span style="font-size:11px;color:#555;">${row.row.mw} MW</span>
                <span style="font-size:11px;font-weight:600;color:${row.row.type==='buy'?'#27ae60':'#e74c3c'};">${row.row.type==='buy'?'pirk.':'pard.'}</span>
                ${row.submitted ? '<span style="font-size:10px;background:#e8f8f0;color:#1e8449;padding:1px 5px;border-radius:10px;">pateikta</span>' : ''}
              ` : '<span style="color:#ccc;font-size:11px;">— nepateikta</span>'}
            </div>`).join('') : '<p style="color:#bbb;text-align:center;padding:16px;font-size:12px;">Nėra komandų</p>'}
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

// Render chart into projector canvas
function renderChartInto(canvasId, s) {
  const ctx = document.getElementById(canvasId); if (!ctx) return;
  const round = Math.max(s.currentRound-1, s.currentRound || 1);
  const prices = getOrGenPrices(s, round);
  const labels = Array.from({length:24},(_,i)=>String(i).padStart(2,'0')+':00');

  const teamDatasets = s.teams.map((t, ti) => {
    const bidData = Array(24).fill(null);
    const submitted = (t.bids||[]).find(b=>b.round===round&&b.submitted);
    if (submitted && t.bidRows && t.bidRows[round]) {
      t.bidRows[round].forEach((row,i) => { if (row && row.price) bidData[i] = +row.price; });
    }
    const color = TEAM_COLORS[ti % TEAM_COLORS.length];
    return { label: t.name, data: bidData, type: 'line', borderColor: color, backgroundColor: 'transparent',
      pointBackgroundColor: color, pointRadius: 4, borderWidth: 2.5, tension: 0.2, spanGaps: false };
  }).filter(ds => ds.data.some(v => v !== null));

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Rinkos kaina', data: prices,
          backgroundColor: 'rgba(100,160,255,.4)', borderColor: 'rgba(100,160,255,.7)',
          borderWidth: 1, borderRadius: 3, type: 'bar', order: 10 },
        ...teamDatasets
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, position: 'top', labels: { color: '#ccc', font: { size: 11 }, boxWidth: 14, padding: 10 } } },
      scales: {
        y: { beginAtZero: false, ticks: { color: '#aaa', font: { size: 10 }, callback: v => v+'$' }, grid: { color: 'rgba(255,255,255,.08)' } },
        x: { ticks: { color: '#aaa', font: { size: 9 }, maxRotation: 45 }, grid: { display: false } }
      },
      animation: { duration: 500 }
    }
  });
}

// ── HELPERS ────────────────────────────────────
function getCurrentBid(t,r){return(t.bids||[]).find(b=>b.round===r)||null;}
function calcBidStatus(s){let sub=0,dft=0,non=0;s.teams.forEach(t=>{const b=getCurrentBid(t,s.currentRound);if(!b)non++;else if(b.submitted)sub++;else dft++;});return{submitted:sub,draft:dft,none:non};}
function statusLabel(st){return{waiting:'Laukiama',active:'Aktyvi',finished:'Baigta'}[st]||st;}
function closeModal(id){document.getElementById(id).classList.remove('open');if(id==='playerModal'&&pgvChartInstance){pgvChartInstance.destroy();pgvChartInstance=null;}}
function closeAllModals(){document.querySelectorAll('.modal-bd').forEach(m=>m.classList.remove('open'));if(pgvChartInstance){pgvChartInstance.destroy();pgvChartInstance=null;}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}
function nav(path){window.location.href=path;}
function logout(){if(confirm('Atsijungti?')){sessionStorage.removeItem('isAdmin');window.location.href='/pages/login.html';}}

// ── INIT ───────────────────────────────────────
loadState();renderActiveSessions();renderPreviousSessions();
</script>

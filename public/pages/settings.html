<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />	
<style>
  :root {
    --primary: #2f4a75;
    --primary-dark: #24395b;
    --background: #f4f5f7;
    --white: #ffffff;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    background: var(--background);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--primary);
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }

  .menu-btn {
    font-size: 24px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    background: white;
    border-radius: 50%;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed;
    left: 0;
    top: 70px;
    width: 250px;
    height: calc(100vh - 70px);
    background: var(--primary);
    color: white;
    padding: 20px;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 200;
    overflow-y: auto;
  }

  .sidebar.active {
    transform: translateX(0);
  }

  .sidebar h3 {
    margin-bottom: 20px;
  }

  .sidebar p {
    padding: 12px 10px;
    cursor: pointer;
    border-radius: 6px;
    margin-bottom: 8px;
    transition: all 0.2s ease;
  }

  .sidebar p:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .overlay {
    position: fixed;
    top: 70px;
    left: 0;
    width: 100%;
    height: calc(100vh - 70px);
    background: rgba(0, 0, 0, 0);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 150;
  }

  .overlay.active {
    background: rgba(0, 0, 0, 0.5);
    opacity: 1;
    pointer-events: all;
  }

  /* MAIN CONTENT */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    overflow-y: auto;
  }

  input, select {
    width: 100%;
    padding: 12px 15px;
    font-size: 16px;
    border: 2px solid #ccc;
    border-radius: 10px;
    margin-bottom: 15px;
    background: white;
    font-family: Arial, Helvetica, sans-serif;
  }

  button {
    width: 100%;
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: var(--primary);
    color: white;
    margin-bottom: 10px;
    transition: 0.2s;
  }

  button:hover {
    background: var(--primary-dark);
  }

  /* FOOTER */
  footer {
    background: var(--primary);
    padding: 10px 8px;
  }

  .footer-buttons {
    display: flex;
    justify-content: space-between;
  }

  .footer-btn {
    flex: 1;
    margin: 0 5px;
    background: white;
    border: none;
    border-radius: 14px;
    padding: 6px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.15s ease;
  }

  .footer-btn:active {
    transform: scale(0.96);
  }

  .icon {
    font-size: 22px;
    margin-bottom: 2px;
    color: var(--primary);
  }

  .label {
    font-size: 11px;
    color: var(--primary);
  }
</style>
</head>

<body>

<header>
  <button class="menu-btn" id="menuBtn">☰</button>
  <div class="header-icon"></div>
</header>

<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <p onclick="navigateTo('/pages/join.html')">Join Game</p>
  <p onclick="navigateTo('/pages/game.html')">Game</p>
  <p onclick="navigateTo('/pages/help.html')">Help</p>
  <p onclick="navigateTo('/pages/admin.html')">Admin</p>
</div>

<div class="overlay" id="overlay"></div>

<main>
  <div style="background:white; border-radius:10px; padding: 20px; margin-bottom: 15px;">
    <h2 style="color: var(--primary); margin-bottom: 10px;">Settings</h2>
  </div>

  <div style="background:white; border-radius:10px; padding: 20px; margin-bottom: 15px;">
    <h3 style="color: var(--primary); margin-bottom: 15px;">Account Settings</h3>
    <label>Username</label>
    <input type="text" placeholder="Enter your username">
    <label>Email</label>
    <input type="email" placeholder="Enter your email">
    <button>Save Changes</button>
  </div>

  <div style="background:white; border-radius:10px; padding: 20px; margin-bottom: 15px;">
    <h3 style="color: var(--primary); margin-bottom: 15px;">Notification Settings</h3>
    <label style="display: flex; align-items: center; margin-bottom: 15px; cursor: pointer;">
      <input type="checkbox" checked style="width: auto; margin-right: 10px; margin-bottom: 0;">
      <span>Game Notifications</span>
    </label>
    <label style="display: flex; align-items: center; margin-bottom: 15px; cursor: pointer;">
      <input type="checkbox" checked style="width: auto; margin-right: 10px; margin-bottom: 0;">
      <span>Feedback Notifications</span>
    </label>
  </div>
</main>

<footer>
  <div class="footer-buttons">
    <button class="footer-btn" id="homeBtn">
      <span class="material-symbols-outlined icon">home</span>
      <span class="label">Home</span>
    </button>

    <button class="footer-btn" id="helpBtn">
      <span class="material-symbols-outlined icon">help</span>
      <span class="label">Help</span>
    </button>

    <button class="footer-btn" id="feedbackBtn">
      <span class="material-symbols-outlined icon">feedback</span>
      <span class="label">Feedback</span>
    </button>

    <button class="footer-btn" id="settingsBtn">
      <span class="material-symbols-outlined icon">settings</span>
      <span class="label">Settings</span>
    </button>
  </div>
</footer>

<script src="/assets/js/sidebar.js"></script>
<script src="/assets/js/footer-nav.js"></script>
<script>
  function navigateTo(path) {
    window.location.href = path;
  }
</script>

</body>
</html>

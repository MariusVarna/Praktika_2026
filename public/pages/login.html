<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administratoriaus prisijungimas</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#f5f1e8 0%,#f0ebe0 100%);background-attachment:fixed;color:#333;display:flex;flex-direction:column;overflow:hidden;position:relative;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 50 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25 2L41.5 11V29L25 38L8.5 29V11Z' fill='none' stroke='%23d4cec2' stroke-width='0.5' opacity='0.5'/%3E%3C/svg%3E");background-size:50px 50px;pointer-events:none;z-index:0;}
    body>*{position:relative;z-index:1;}
    header{background:linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);height:58px;display:flex;align-items:center;padding:0 16px;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);flex-shrink:0;}
    .back-btn{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:6px;border-radius:8px;transition:background .2s;}
    .back-btn:hover{background:rgba(255,255,255,.1);}
    .app-name{color:white;font-size:16px;font-weight:600;}
    .admin-badge{background:rgba(255,165,0,.3);color:#ffd78a;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid rgba(255,165,0,.4);}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;overflow-y:auto;}
    .card{width:100%;max-width:380px;background:white;border-radius:16px;padding:32px 28px;box-shadow:0 4px 16px rgba(0,0,0,.1);border:1px solid #e8dfd4;}
    .card h1{font-size:22px;font-weight:700;color:#2f4a75;margin-bottom:6px;text-align:center;}
    .card p{color:#888;font-size:13px;margin-bottom:24px;line-height:1.5;text-align:center;}
    label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
    input{width:100%;padding:12px 14px;font-size:14px;border:2px solid #d4cec2;border-radius:10px;background:#fafaf8;color:#333;margin-bottom:16px;transition:all .3s;}
    input:focus{outline:none;border-color:#2f4a75;background:white;box-shadow:0 0 0 3px rgba(47,74,117,.1);}
    input::placeholder{color:#bbb;}
    .btn{width:100%;padding:13px;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all .3s;margin-bottom:10px;}
    .btn-primary{background:linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);color:white;box-shadow:0 4px 12px rgba(47,74,117,.25);}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(47,74,117,.3);}
    .btn-outline{background:transparent;color:#2f4a75;border:2px solid #d4cec2;}
    .btn-outline:hover{border-color:#2f4a75;background:#f9f7f3;}
    .error-msg{color:#e74c3c;font-size:13px;margin-top:-10px;margin-bottom:14px;display:none;text-align:center;}
    .error-msg.show{display:block;}
    .demo-box{margin-top:16px;padding:12px;background:#f5f1e8;border-radius:10px;border:1px dashed #2f4a75;}
    .demo-box p{font-size:12px;color:#666;margin-bottom:6px;font-weight:600;}
    .demo-row{display:flex;gap:6px;margin-bottom:4px;}
    .demo-row code{flex:1;padding:6px;background:white;border-radius:6px;border:1px solid #e0d9cc;font-family:monospace;font-size:12px;color:#2f4a75;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-thumb{background:#d4cec2;border-radius:3px;}
    @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
    .shake{animation:shake .4s ease;}
  </style>
</head>
<body>
<header>
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="app-name">Pavadinimas</span>
  <span class="admin-badge">ADMIN</span>
</header>
<main>
  <div class="card" id="loginCard">
    <h1>Prisijunkite</h1>
    <p>Administratoriaus paskyra</p>
    <label>Slapyvardis</label>
    <input id="usernameInput" type="text" placeholder="Įveskite slapyvardį" autocomplete="off"/>
    <label>Slaptažodis</label>
    <input id="passwordInput" type="password" placeholder="••••••••"/>
    <div class="error-msg" id="errorMsg">Neteisingas slapyvardis arba slaptažodis</div>
    <button class="btn btn-primary" id="loginBtn">Prisijungti</button>
    <button class="btn btn-outline" onclick="history.back()">Atšaukti</button>
    <div class="demo-box">
      <p>Demo kredencialai:</p>
      <div class="demo-row"><code>Slapyvardis: admin</code></div>
      <div class="demo-row"><code>Slaptažodis: admin123</code></div>
    </div>
  </div>
</main>

<script src="/js/api.js"></script>
<script>
const loginBtn = document.getElementById('loginBtn');
const errorMsg = document.getElementById('errorMsg');

loginBtn.addEventListener('click', login);
document.getElementById('passwordInput').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
document.getElementById('usernameInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('passwordInput').focus(); });
['usernameInput','passwordInput'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => errorMsg.classList.remove('show'));
});

async function login() {
  const u = document.getElementById('usernameInput').value.trim();
  const p = document.getElementById('passwordInput').value;
  
  if (!u || !p) {
    showError('Įveskite duomenis');
    return;
  }

  try {
    await API.Auth.login(u, p);
    window.location.href = '/pages/admin.html';
  } catch (err) {
    showError('Neteisingas slapyvardis arba slaptažodis');
  }
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
  const card = document.getElementById('loginCard');
  card.classList.add('shake');
  setTimeout(() => card.classList.remove('shake'), 400);
}
</script>
</body>
</html>

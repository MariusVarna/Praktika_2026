<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pavadinimas — Prisijungti</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#f5f1e8 0%,#f0ebe0 100%);background-attachment:fixed;color:#333;display:flex;flex-direction:column;overflow:hidden;position:relative;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 50 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25 2L41.5 11V29L25 38L8.5 29V11Z' fill='none' stroke='%23d4cec2' stroke-width='0.5' opacity='0.5'/%3E%3C/svg%3E");background-size:50px 50px;pointer-events:none;z-index:0;}
    body>*{position:relative;z-index:1;}
    header{background:linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);flex-shrink:0;}
    .app-name{color:white;font-size:17px;font-weight:700;letter-spacing:.3px;}
    .header-icon{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px;cursor:pointer;transition:background .2s;}
    .header-icon:hover{background:rgba(255,255,255,.3);}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;overflow-y:auto;}
    .card{width:100%;max-width:380px;background:white;border-radius:16px;padding:32px 28px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.1);border:1px solid #e8dfd4;}
    .card h1{font-size:22px;font-weight:700;color:#2f4a75;margin-bottom:6px;}
    .card p{color:#888;font-size:13px;margin-bottom:24px;line-height:1.5;}
    label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:6px;text-align:left;text-transform:uppercase;letter-spacing:.4px;}
    input{width:100%;padding:14px 16px;font-size:22px;text-align:center;letter-spacing:8px;border:2px solid #d4cec2;border-radius:10px;background:#fafaf8;color:#2f4a75;margin-bottom:20px;font-family:'Courier New',monospace;font-weight:700;transition:all .3s;}
    input:focus{outline:none;border-color:#2f4a75;background:white;box-shadow:0 0 0 3px rgba(47,74,117,.12);}
    input::placeholder{color:#ccc;letter-spacing:4px;font-size:18px;}
    .btn{width:100%;padding:14px;font-size:15px;font-weight:700;border:none;border-radius:10px;background:linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);color:white;cursor:pointer;transition:all .3s;letter-spacing:.3px;box-shadow:0 4px 12px rgba(47,74,117,.25);}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(47,74,117,.3);}
    .btn:active{transform:translateY(0);}
    .error-msg{color:#e74c3c;font-size:13px;margin-top:-14px;margin-bottom:14px;text-align:left;display:none;}
    .error-msg.show{display:block;}
    footer{background:linear-gradient(135deg,#2f4a75 0%,#1f3a55 100%);padding:10px 8px;display:flex;flex-shrink:0;box-shadow:0 -2px 8px rgba(0,0,0,.1);}
    .footer-buttons{display:flex;gap:6px;width:100%;}
    .footer-btn{flex:1;background:rgba(255,255,255,.12);border:none;border-radius:10px;padding:9px 0;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all .2s;color:white;}
    .footer-btn:hover{background:rgba(255,255,255,.22);}
    .footer-btn.active-tab{background:rgba(255,255,255,.25);}
    .footer-icon{font-size:20px;margin-bottom:2px;}
    .footer-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-thumb{background:#d4cec2;border-radius:3px;}
  </style>
</head>
<body>
<header>
  <div class="app-name">Pavadinimas</div>
  <div class="header-icon" id="userIcon">A</div>
</header>
<main>
  <div class="card">
    <h1>Sesijos PIN kodas</h1>
    <p>Įveskite 6 skaitmenų PIN kodą, kurį suteikė žaidimo administratorius</p>
    <label>PIN kodas</label>
    <input id="pinInput" type="text" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="off"/>
    <div class="error-msg" id="errorMsg">Įveskite teisingą 6 skaitmenų PIN kodą</div>
    <button class="btn" id="joinBtn">Prisijungti →</button>
  </div>
</main>
<footer>
  <div class="footer-buttons">
    <button class="footer-btn active-tab" onclick="nav('/pages/join.html')">
      <span class="material-symbols-outlined footer-icon">home</span>
      <span class="footer-label">Pin kodas</span>
    </button>
    <button class="footer-btn" onclick="nav('/pages/help.html')">
      <span class="material-symbols-outlined footer-icon">sports_esports</span>
      <span class="footer-label">Žinynas</span>
    </button>
    <button class="footer-btn" onclick="nav('/pages/review.html')">
      <span class="material-symbols-outlined footer-icon">chat</span>
      <span class="footer-label">Atsiliepimai</span>
    </button>
    <button class="footer-btn" onclick="nav('/pages/settings.html')">
      <span class="material-symbols-outlined footer-icon">settings</span>
      <span class="footer-label">Parinktys</span>
    </button>
  </div>
</footer>
<script>
document.getElementById('userIcon').addEventListener('click', () => nav('/pages/login.html'));

const pinInput = document.getElementById('pinInput');
const errorMsg = document.getElementById('errorMsg');

pinInput.addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g,'').slice(0,6);
  e.target.value = v;
  errorMsg.classList.remove('show');
});

pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

document.getElementById('joinBtn').addEventListener('click', submit);

function submit() {
  const pin = pinInput.value.trim();
  if (pin.length !== 6 || !/^\d+$/.test(pin)) {
    errorMsg.classList.add('show');
    pinInput.focus();
    return;
  }
  nav('/pages/lobby.html?pin=' + pin);
}

function nav(path) { window.location.href = path; }
</script>
</body>
</html>

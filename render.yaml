services:
  - type: web
    name: energy-trading-backend
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: energy-trading-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://prak2026-eb951.web.app,https://prak2026-eb951.firebaseapp.com,https://your-vercel-app.vercel.app

databases:
  - name: energy-trading-db
    plan: free
    databaseName: energy_trading
    user: energy_user